const daysUntil=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000)};
// Simple CSV parser supporting quoted fields with commas/newlines
const parseCSV=text=>{
  const rows=[];let row=[];let field='';let inQuotes=false;
  const s=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(inQuotes){
      if(c==='"'){
        if(s[i+1]==='"'){field+='"';i++;}else{inQuotes=false;}
      }else field+=c;
    }else{
      if(c==='"')inQuotes=true;
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else field+=c;
    }
  }
  if(field!==''||row.length>0){row.push(field);rows.push(row);}
  if(rows.length===0)return{headers:[],records:[]};
  const headers=rows[0].map(h=>h.replace(/^\uFEFF/,'').trim());
  const records=rows.slice(1).filter(r=>r.some(c=>c.trim()!=='')).map(r=>{
    const obj={};headers.forEach((h,i)=>obj[h]=(r[i]??'').trim());return obj;
  });
  return{headers,records};
};
// Convert common Google Drive share link formats to a direct-download URL
// Normalize various date formats from CSV to YYYY-MM-DD (required by <input type="date">)
const normalizeDate=s=>{
  if(!s)return s;
  s=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s; // already ISO
  if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s.split('T')[0]; // ISO with time
  let m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/); // DD.MM.YYYY / DD/MM/YYYY / DD-MM-YYYY
  if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2})$/); // DD.MM.YY (2-digit year)
  if(m){const yy=parseInt(m[3]);const yyyy=yy<70?2000+yy:1900+yy;return `${yyyy}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
  m=s.match(/^(\d{4})[.\/-](\d{1,2})[.\/-](\d{1,2})$/); // YYYY.MM.DD etc
  if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  if(/^\d{4,6}$/.test(s)){ // Excel serial date number (days since 1899-12-30)
    const n=parseInt(s);
    if(n>20000&&n<60000){
      const d=new Date(Date.UTC(1899,11,30)+n*86400000);
      return d.toISOString().split('T')[0];
    }
  }
  const d=new Date(s);
  if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];
  return s;
};
const driveDirectUrl=url=>{
  if(!url)return null;
  const m=url.match(/\/file\/d\/([^/]+)/)||url.match(/[?&]id=([^&]+)/)||url.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
  const id=m?m[1]:null;
  if(!id)return null;
  return `https://drive.google.com/uc?export=download&id=${id}`;
};
// Fetch a PDF (e.g. from Google Drive) and render its first page to a JPEG data URL, matching the manual upload flow
const fetchPdfFirstPage=async url=>{
  const direct=driveDirectUrl(url)||url;
  const res=await fetch(direct);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const buf=await res.arrayBuffer();
  if(!window.pdfjsLib){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
      s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  }
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const vp=page.getViewport({scale:1.5});
  const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  return{order_pdf_page1:canvas.toDataURL('image/jpeg',0.82),order_pdf_pages:pdf.numPages};
};

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a3dmempwa2hybXNpb3Z4bGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY1NzMsImV4cCI6MjA5NzI3MjU3M30.tlFy0eMAS5g-XHFeugYGKyAPl-qhlotGyX_DXLCRcpc';
const SB_HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};

// Map localStorage key → Supabase table name
const SB_TABLE={
  tm_drivers:'drivers',tm_vehicles:'vehicles',tm_repairs:'repairs',

// Fetch all rows from Supabase table → array of data objects
const sbFetch=async table=>{
  const r=await fetch(`${SB_URL}/rest/v1/${table}?select=id,data&order=created_at.asc`,{headers:SB_HEADERS});
  if(!r.ok)return null;
  const rows=await r.json();

};

// Upsert one item to Supabase (insert or update by _sbid)
const sbUpsert=async(table,item)=>{
  const {_sbid,...data}=item;
  if(_sbid){
    await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${_sbid}`,{
      method:'PATCH',headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify({data}),
    });
    return _sbid;
  }else{
    const r=await fetch(`${SB_URL}/rest/v1/${table}`,{
      method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({data}),
    });
    const rows=await r.json();
    return rows?.[0]?.id;
  }
};

// Delete one item from Supabase by _sbid
const sbDelete=async(table,sbid)=>{
  await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${sbid}`,{
    method:'DELETE',headers:SB_HEADERS,
  });
};

// Sync singleton (company/settings) to Supabase
const sbUpsertSingleton=async(table,obj)=>{
  const {_sbid,...data}=obj||{};
  if(_sbid){
    await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${_sbid}`,{

};

// ─── HYBRID STORE HOOK ────────────────────────────────────────────────────────
// Loads from localStorage instantly, then hydrates from Supabase on mount.
// Writes go to both localStorage and Supabase.
const useStore=(key,init)=>{
  const sbTable=SB_TABLE[key];
  const isSingleton=SB_SINGLETON.has(key);

  const [data,setData]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}
  });

  // Hydrate from Supabase — merge with local unsynced items
  useEffect(()=>{
    if(!sbTable)return;
    (async()=>{
      try{
        if(isSingleton){
          const r=await fetch(`${SB_URL}/rest/v1/${sbTable}?select=id,data&limit=1`,{headers:SB_HEADERS});
          if(!r.ok)return;
          const rows=await r.json();
          if(rows.length>0){
            const merged={...rows[0].data,_sbid:rows[0].id};
            setData(merged);localStorage.setItem(key,JSON.stringify(merged));
          }
        }else{
          const rows=await sbFetch(sbTable);
          if(!rows)return;
          const local=JSON.parse(localStorage.getItem(key)||'[]');
          const remoteIds=new Set(rows.map(r=>r.id));
          // Keep local items not yet in Supabase (no _sbid or id not in remote)
          const unsynced=(Array.isArray(local)?local:[]).filter(l=>l.id&&!remoteIds.has(l.id));
          const merged=[...rows,...unsynced];
          setData(merged);localStorage.setItem(key,JSON.stringify(merged));
          // Push unsynced to Supabase and update _sbid
          if(unsynced.length>0){
            const withIds=[...merged];
            for(let i=0;i<unsynced.length;i++){
              try{
                const sbid=await sbUpsert(sbTable,unsynced[i]);
                if(sbid){
                  const idx=withIds.findIndex(x=>x.id===unsynced[i].id);
                  if(idx>=0)withIds[idx]={...withIds[idx],_sbid:sbid};
                }
              }catch(e){}
            }
            setData(withIds);localStorage.setItem(key,JSON.stringify(withIds));
          }
        }
      }catch(e){console.warn('hydrate failed:',key,e);}
    })();
  },[]);

  const set=v=>{
    setData(prev=>{
      const n=typeof v==='function'?v(prev):v;
      // Write to localStorage immediately
      localStorage.setItem(key,JSON.stringify(n));
      // Sync to Supabase in background
      if(sbTable)(async()=>{
        try{
          if(isSingleton){
            await sbUpsertSingleton(sbTable,n);
          }else{
            const prevArr=Array.isArray(prev)?prev:[];
            const newArr=Array.isArray(n)?n:[];
            const prevIds=new Set(prevArr.map(x=>x.id));
            const newIds=new Set(newArr.map(x=>x.id));
            // Upsert added/changed
            for(const item of newArr){
              const old=prevArr.find(x=>x.id===item.id);
              if(!old||JSON.stringify(old)!==JSON.stringify(item)){
                try{
                  const sbid=await sbUpsert(sbTable,item);
                  if(sbid&&!item._sbid){
                    // Update _sbid in localStorage
                    const cur=JSON.parse(localStorage.getItem(key)||'[]');
                    const upd=(Array.isArray(cur)?cur:[]).map(x=>x.id===item.id?{...x,_sbid:sbid}:x);
                    localStorage.setItem(key,JSON.stringify(upd));
                    setData(upd);
                  }
                }catch(e){}
              }
            }
            // Delete removed
            for(const old of prevArr){
              if(!newIds.has(old.id)&&old._sbid) sbDelete(sbTable,old._sbid).catch(()=>{});
            }
          }
        }catch(e){console.warn('sync failed:',key,e);}
      })();
      return n;
    });
  };

  return [data,set];
};

const handleEnterNext=e=>{
  if(e.key!=='Enter')return;
  if(e.target.tagName==='TEXTAREA')return;
  e.preventDefault();
  const container=e.target.closest('.modal-box')||document;
  const focusables=Array.from(container.querySelectorAll('input, select, textarea, button'))
    .filter(el=>!el.disabled&&el.offsetParent!==null);
  const idx=focusables.indexOf(e.target);
  if(idx===-1)return;
  for(let i=idx+1;i<focusables.length;i++){
    const el=focusables[i];
    if(el.tagName==='INPUT'||el.tagName==='SELECT'||el.tagName==='TEXTAREA'){
      el.focus();
      if(el.select)el.select();
      break;
    }
  }
};

            const highway=parseFloat(o.rate_highway)||0;
            const parking=parseFloat(o.rate_parking)||0;
            const extrasSum=(o.extras||[]).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
            const km=parseFloat(o.kilometers)||0;
            const fuelEUR=km>0&&cons>0&&fp>0?(km/100*cons*fp):0;
            const refDate=o.load_date||today();

const fetchFromGUS=async(nip,setForm,setErr,setLoading)=>{
  const cl=nip.replace(/[^0-9]/g,'');
  if(cl.length!==10){setErr('NIP musi mieć 10 cyfr');return;}
  setLoading(true);setErr('');
  try{
    // Try rejestr.io first
    let found=false;
    try{
      const r=await fetch(`https://rejestr.io/api/v2/nip/${cl}`,{headers:{'Accept':'application/json'}});
      if(r.ok){
        const d=await r.json();
        if(d&&d.name){
          const st=d.address?.street?`ul. ${d.address.street}${d.address.building?' '+d.address.building:''}${d.address.apartment?'/'+d.address.apartment:''}`:d.address?.full||'';
          const city=d.address?.city||'';const zip=d.address?.zip||'';
          const addr=[st,zip&&city?`${zip} ${city}`:city||zip].filter(Boolean).join(', ');
          setForm(p=>({...p,name:d.name,nip:cl,address:addr||p.address||p.buyer_address}));
          setErr('');setLoading(false);found=true;return;
        }
      }
    }catch(e){}
    if(found)return;
    // Fallback: MF whitelist API
    const mf=await fetch(`https://wl-api.mf.gov.pl/api/search/nip/${cl}?date=${today()}`);
    if(!mf.ok)throw new Error(`MF API error ${mf.status}`);
    const md=await mf.json();const s=md?.result?.subject;
    if(s&&s.name){
      const addr=s.workingAddress||s.residenceAddress||'';
      setForm(p=>({...p,name:s.name,nip:cl,address:addr||p.address||p.buyer_address}));
      setErr('');
    } else {
      setErr('Nie znaleziono podmiotu dla tego NIP');
    }
  }catch(e){
    setErr('Błąd połączenia z GUS/MF. Sprawdź internet.');
    console.error('GUS error:',e);
  }
  setLoading(false);
};

          <label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-upload"/> {fileData?'Zmień plik':allowImages?'Wgraj PDF/zdjęcie':'Wgraj PDF'}<input type="file" accept={acceptAttr} onChange={handleUpload} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/></label>
          {allowImages&&<label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-camera"/> Zrób zdjęcie<input type="file" accept="image/*" capture="environment" onChange={handleUpload} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/></label>}
          {fileData&&<span style={{fontSize:11,color:'#3B6D11',display:'flex',alignItems:'center',gap:4}}><i className="ti ti-circle-check"/>{fileName}<button style={{...C.btn,padding:'1px 4px',marginLeft:4,color:'#185FA5'}} onClick={()=>setPdfPreview({data:fileData,name:fileName})} title="Podgląd"><i className="ti ti-eye"/></button><button style={{...C.btn,padding:'1px 4px'}} onClick={()=>setForm(p=>({...p,[fileKey]:null,[`${fileKey}_name`]:null}))}><i className="ti ti-trash"/></button></span>}
        </div>
      </div>
    );
  };

  const isForeign=form.country&&form.country!=='PL';
  const [fCountry,setFCountry]=useState('');
  const [fStatus,setFStatus]=useState('');
  const usedCountries=[...new Set(drivers.map(d=>d.country||'PL'))].sort();
  const effStatus=d=>(d.employment_end&&d.employment_end<today())?'nieaktywny':(d.status||'aktywny');
  const anyDriverFilter=fCountry||fStatus;
  const filteredDrivers=drivers.filter(d=>{
    if(fCountry&&(d.country||'PL')!==fCountry)return false;
    if(fStatus&&effStatus(d)!==fStatus)return false;
    return true;
  });

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h1 style={{fontSize:18,fontWeight:500,margin:0}}>Kierowcy</h1><button style={C.btnP} onClick={()=>{setForm({country:'PL'});setDocs([]);setWorkPermitDocs([]);setModal('add')}}><i className="ti ti-plus"/> Dodaj</button></div>
    <div style={{...C.card,marginBottom:10,padding:'10px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:10,fontWeight:500,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em',display:'flex',alignItems:'center',gap:4}}><i className="ti ti-filter"/>Filtry</span>
        {anyDriverFilter&&<button style={{...C.btn,fontSize:10,padding:'1px 7px',color:'#A32D2D'}} onClick={()=>{setFCountry('');setFStatus('')}}><i className="ti ti-x"/> Wyczyść</button>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
        <div><label style={C.lbl}>Kraj</label><select style={C.inp} value={fCountry} onChange={e=>setFCountry(e.target.value)}><option value="">Wszystkie</option>{usedCountries.map(c=><option key={c}>{c}</option>)}</select></div>
        <div><label style={C.lbl}>Status</label><select style={C.inp} value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="">Wszystkie</option><option value="aktywny">Aktywny</option><option value="w_rekrutacji">W rekrutacji</option><option value="urlop">Urlop</option><option value="zwolnienie">Zwolnienie</option><option value="nieaktywny">Nieaktywny</option></select></div>
      </div>
      {anyDriverFilter&&<div style={{marginTop:6,fontSize:10,color:'#888'}}>Wyniki: <strong style={{color:'#1a1a18'}}>{filteredDrivers.length}</strong> z {drivers.length}</div>}
    </div>
    <div style={C.card}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr>{['Imię i nazwisko','Kraj','Nr PJ','Telefon','Ważność PJ','Umowa','Status',''].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
      <tbody>{filteredDrivers.map(d=>(<tr key={d.id}>
        <td style={C.td}><strong style={{fontWeight:500}}>{d.first_name} {d.last_name}</strong></td>
        <td style={C.td}>{d.country&&d.country!=='PL'?<span style={bdg('amber')}>{d.country}</span>:'PL'}</td>
        <td style={C.td}>{d.license_number}</td><td style={C.td}>{d.phone}</td>
        <td style={C.td}>{d.license_expiry?<span style={daysUntil(d.license_expiry)<=30?bdg('red'):{fontSize:12}}>{d.license_expiry}</span>:'–'}</td>
        <td style={C.td}>{d.contract_type==='zlecenie'?'Zlecenie':d.contract_type==='o_prace'?'O pracę':d.contract_type==='samozatrudnienie'?'B2B':'–'}</td>
        <td style={C.td}>{(()=>{const eff=effStatus(d);const col=eff==='aktywny'?'green':eff==='urlop'?'amber':eff==='w_rekrutacji'?'blue':'red';const lbl=eff==='w_rekrutacji'?'w rekrutacji':eff;return<span style={bdg(col)}>{lbl}</span>;})()}</td>
        <td style={C.td}><button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm(d);setDocs(d.documents||[]);setWorkPermitDocs(d.workPermitDocs||[]);setModal('edit')}}><i className="ti ti-edit"/></button><button style={{...C.btn,padding:'2px 5px',marginLeft:3}} onClick={()=>setDrivers(p=>p.filter(x=>x.id!==d.id))}><i className="ti ti-trash"/></button></td>
      </tr>))}</tbody>
    </table>{filteredDrivers.length===0&&<div style={{textAlign:'center',padding:20,color:'#888',fontSize:11}}>{drivers.length===0?'Brak kierowców.':'Brak kierowców spełniających filtry.'}</div>}</div>
    {modal&&<Modal title={modal==='add'?'Dodaj kierowcę':'Edytuj kierowcę'} onClose={()=>setModal(null)} wide>
      <div style={C.g2}>
        {F('first_name','Imię')}{F('last_name','Nazwisko')}
        <div><label style={C.lbl}>Kraj pochodzenia</label><select style={C.inp} value={form.country||'PL'} onChange={e=>setForm(p=>({...p,country:e.target.value}))}>
          {['PL','UA','BY','GE','UZ','TJ','KZ','MD','RU','IN','DE','LT','LV'].map(c=><option key={c}>{c}</option>)}
        </select></div>
        {F('pesel',form.country==='PL'?'PESEL':'Nr dokumentu tożsamości')}
        {F('phone','Telefon')}{F('license_number','Nr PJ')}{F('license_expiry','Ważność PJ','date')}
        <div><label style={C.lbl}>Status</label><select style={C.inp} value={form.status||'aktywny'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option value="aktywny">Aktywny</option><option value="w_rekrutacji">W rekrutacji</option><option value="urlop">Urlop</option><option value="zwolnienie">Zwolnienie</option><option value="nieaktywny">Nieaktywny</option></select></div>
        {F('employment_start','Data podjęcia pracy','date')}
        {F('employment_end','Data zakończenia pracy','date')}
        <div><label style={C.lbl}>Typ umowy</label><select style={C.inp} value={form.contract_type||''} onChange={e=>setForm(p=>({...p,contract_type:e.target.value}))}>
          <option value="">Wybierz...</option>
          <option value="zlecenie">Umowa zlecenie</option>
          <option value="o_prace">Umowa o pracę</option>
          <option value="samozatrudnienie">Samozatrudnienie (B2B)</option>
        </select></div>
        <div><label style={C.lbl}>Stawka dzienna (PLN)</label><input style={C.inp} type="number" step="0.01" placeholder="np. 250.00" value={form.daily_rate||''} onChange={e=>setForm(p=>({...p,daily_rate:e.target.value}))}/></div>
        {F('address','Adres',undefined,true)}
      </div>

      {/* Documents for foreign drivers */}
      {isForeign&&<div style={{marginTop:12,background:'#FAEEDA',border:'0.5px solid #EF9F27',borderRadius:8,padding:'10px 12px'}}>
        <div style={{fontSize:11,fontWeight:500,color:'#854F0B',marginBottom:8,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-flag"/>Dokumenty dla kierowcy z kraju innego niż Polska ({form.country})</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <PdfField label="Paszport" fileKey="passport_pdf" dateKey="passport_expiry" allowImages={true}/>
          <PdfField label="Dokument uprawniający do pobytu" fileKey="residence_pdf" dateKey="residence_doc_expiry" extraField={
            <div><label style={C.lbl}>Zasada / podstawa pobytu</label><select style={C.inp} value={form.residence_basis||''} onChange={e=>setForm(p=>({...p,residence_basis:e.target.value}))}>
              <option value="">Wybierz...</option>
              <option value="wiza">Wiza</option>
              <option value="karta_pobytu">Karta pobytu</option>
              <option value="zezwolenie_na_pracę">Zezwolenie na pracę</option>
              <option value="oświadczenie">Oświadczenie o powierzeniu pracy</option>
              <option value="ruch_bezwizowy">Ruch bezwizowy</option>
              <option value="ochrona_czasowa">Ochrona czasowa (np. UKR)</option>
              <option value="inne">Inne</option>
            </select></div>
          } allowImages={true}/>
        </div>

        {/* Zezwolenia i dokumenty z urzędu pracy */}
        <div style={{marginTop:10,background:'#f5f4f0',borderRadius:8,padding:'10px 12px'}}>
          <div style={{fontSize:11,fontWeight:500,marginBottom:7}}>Zezwolenia i dokumenty z urzędu pracy</div>
          <div style={{marginBottom:8}}>
            <label style={C.lbl}>Data końca ważności oświadczenia / zezwolenia na pracę</label>
            <input style={{...C.inp,maxWidth:220}} type="date" value={form.work_permit_expiry||''} onChange={e=>setForm(p=>({...p,work_permit_expiry:e.target.value}))}/>
            <div style={{fontSize:10,color:'#888',marginTop:3}}>Przypomnienie pojawi się w Panelu głównym 30 dni przed upływem terminu.</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
            <div><label style={C.lbl}>Zadeklarowane wynagrodzenie (PLN/mies.)</label><input style={C.inp} type="number" step="0.01" placeholder="np. 5500.00" value={form.declared_salary||''} onChange={e=>setForm(p=>({...p,declared_salary:e.target.value}))}/></div>
            <div>
              <label style={C.lbl}>Wymiar czasu pracy</label>
              <select style={C.inp} value={form.working_time||''} onChange={e=>setForm(p=>({...p,working_time:e.target.value}))}>
                <option value="">Wybierz...</option>
                <option value="1/1">Pełny etat (1/1)</option>
                <option value="3/4">3/4 etatu</option>
                <option value="1/2">1/2 etatu</option>
                <option value="1/4">1/4 etatu</option>
                <option value="godziny">Liczba godzin (wpisz ręcznie)</option>
                <option value="umowa_zlecenie">Umowa zlecenie</option>
                <option value="inne">Inne</option>
              </select>
              {form.working_time==='godziny'&&<input style={{...C.inp,marginTop:6}} type="number" step="0.5" placeholder="np. 120 godz./mies." value={form.working_time_hours||''} onChange={e=>setForm(p=>({...p,working_time_hours:e.target.value}))}/>}
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-upload"/> Wgraj dokumenty PDF<input type="file" multiple accept=".pdf,application/pdf" onChange={addWorkPermitDoc} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/></label>
          </div>
          {workPermitDocs.length>0&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
            {workPermitDocs.map(d=>(
              <div key={d.id} style={{display:'flex',gap:7,alignItems:'center',background:'#fff',border:'0.5px solid rgba(0,0,0,0.08)',borderRadius:7,padding:'6px 9px'}}>
                <i className="ti ti-file-type-pdf" style={{color:'#A32D2D',fontSize:16}}/>
                <span style={{fontSize:11,whiteSpace:'nowrap',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis'}}>{d.name}</span>
                <input style={{...C.inp,flex:1}} placeholder="Opis dokumentu (np. zezwolenie typ A 2026)" value={d.description} onChange={e=>updWorkPermitDoc(d.id,e.target.value)}/>
                <button style={{...C.btn,padding:'3px 6px',color:'#185FA5'}} onClick={()=>setPdfPreview({data:d.data,name:d.name})} title="Podgląd"><i className="ti ti-eye"/></button>
                <button style={{...C.btn,padding:'3px 6px'}} onClick={()=>remWorkPermitDoc(d.id)}><i className="ti ti-trash"/></button>
              </div>
            ))}
          </div>}
          {workPermitDocs.length===0&&<div style={{fontSize:11,color:'#aaa'}}>Brak wgranych dokumentów.</div>}
        </div>
      </div>}

      {/* Documents for all drivers: contract + IMI */}
      <div style={{marginTop:12}}>
        <div style={C.secT}>Dokumenty kierowcy</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <PdfField label="Umowa" fileKey="contract_pdf" allowImages={true}/>
          <PdfField label="Dokument IMI" fileKey="imi_pdf" dateKey="imi_expiry" allowImages={true}/>
          <PdfField label="Prawo jazdy" fileKey="license_pdf" allowImages={true}/>
          {!isForeign&&<PdfField label="Dowód osobisty" fileKey="id_card_pdf" allowImages={true}/>}
        </div>
      </div>

      {/* Other documents - generic */}
      <div style={{marginTop:12}}><div style={C.secT}>Inne dokumenty</div><input type="file" multiple accept=".pdf,image/*" onChange={hf} style={{fontSize:11,marginBottom:6}}/>{docs.map((d,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 8px',background:'#f5f4f0',borderRadius:5,marginBottom:3,fontSize:11}}><span>{d.name}</span><div style={{display:'flex',gap:4}}><button style={{...C.btn,padding:'1px 4px',color:'#185FA5'}} onClick={()=>setPdfPreview({data:d.data,name:d.name})} title="Podgląd"><i className="ti ti-eye"/></button><button style={{...C.btn,padding:'1px 4px'}} onClick={()=>setDocs(x=>x.filter((_,j)=>j!==i))}><i className="ti ti-x"/></button></div></div>)}</div>

      <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:12,position:'sticky',bottom:0,background:'#fff',paddingTop:10,paddingBottom:6,borderTop:'0.5px solid rgba(0,0,0,0.08)'}}><button style={C.btn} onClick={()=>setModal(null)}>Anuluj</button><button style={C.btnP} onClick={save}>Zapisz</button></div>
    </Modal>}
    {pdfPreview&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10001}} onClick={()=>setPdfPreview(null)}>
      <div style={{background:'#fff',borderRadius:14,padding:14,maxWidth:760,width:'95%',maxHeight:'90vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div style={{fontSize:13,fontWeight:500}}><i className="ti ti-file-type-pdf" style={{color:'#A32D2D',marginRight:5}}/>{pdfPreview.name}</div><button style={{...C.btn,padding:'2px 6px'}} onClick={()=>setPdfPreview(null)}><i className="ti ti-x"/></button></div>
        {pdfPreview.data&&pdfPreview.data.startsWith('data:application/pdf')
          ? <iframe src={pdfPreview.data} style={{width:'100%',height:'75vh',border:'0.5px solid rgba(0,0,0,0.1)',borderRadius:7}}/>
          : <img src={pdfPreview.data} style={{width:'100%',maxHeight:'75vh',objectFit:'contain',borderRadius:7}}/>}
      </div>
    </div>}
  </div>);
};

// KADRY (wrapper with sub-tabs: Kierowcy, Ewidencja wynagrodzeń)
const Kadry=({db})=>{
  const [tab,setTab]=useState('kierowcy');
  return(<div>
    <div style={{display:'flex',gap:5,marginBottom:14}}>
      {[{id:'kierowcy',label:'Kierowcy',icon:'ti-steering-wheel'},{id:'payroll',label:'Ewidencja wynagrodzeń',icon:'ti-cash'}].map(t=>
        <button key={t.id} style={{...C.btn,...(tab===t.id?{background:'#f5f4f0',fontWeight:500}:{})}} onClick={()=>setTab(t.id)}><i className={`ti ${t.icon}`} style={{marginRight:5}}/>{t.label}</button>
      )}
    </div>
    {tab==='kierowcy'&&<Drivers db={db}/>}
    {tab==='payroll'&&<PayrollRecords db={db}/>}
  </div>);
};

// PAYROLL (Ewidencja wynagrodzeń)
const PayrollRecords=({db})=>{
  const [payroll,setPayroll]=db.payroll;
  const [drivers]=db.drivers;
  const [modal,setModal]=useState(false);const [form,setForm]=useState({});
  const [pdfPreview,setPdfPreview]=useState(null);
  const [fileLoading,setFileLoading]=useState(false);
  const [selMonth,setSelMonth]=useState(()=>today().slice(0,7));
  const names=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  const [selYear,selMM]=selMonth.split('-');
  const monthLabel=`${names[parseInt(selMM)-1]} ${selYear}`;

  const save=()=>{
    if(form.id)setPayroll(p=>p.map(x=>x.id===form.id?{...x,...form}:x));
    else setPayroll(p=>[...p,{...form,id:gid(),created_at:today()}]);
    setModal(false);
  };
  const addDoc=e=>{
    setFileLoading(true);
    const files=Array.from(e.target.files);
    let remaining=files.length;
    files.forEach(f=>{
      const rd=new FileReader();
      rd.onload=ev=>{
        setForm(p=>({...p,documents:[...(p.documents||[]),{id:gid(),name:f.name,data:ev.target.result,description:''}]}));
        remaining--;if(remaining===0)setFileLoading(false);
      };
      rd.onerror=()=>{remaining--;if(remaining===0)setFileLoading(false);};
      rd.readAsDataURL(f);
    });
    e.target.value='';
  };
  const updDocDesc=(id,desc)=>setForm(p=>({...p,documents:(p.documents||[]).map(d=>d.id===id?{...d,description:desc}:d)}));
  const remDoc=id=>setForm(p=>({...p,documents:(p.documents||[]).filter(d=>d.id!==id)}));
  const F=(k,l,t='text',full=false)=>(<div style={full?{gridColumn:'span 2'}:{}}><label style={C.lbl}>{l}</label><input style={C.inp} type={t} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>);

  const monthRecords=payroll.filter(p=>(p.month||'')===selMonth);
  // Drivers active during selMonth based on employment_start/employment_end
  const monthStart=`${selMonth}-01`;
  const monthEndDate=new Date(parseInt(selYear),parseInt(selMM),0); // last day of month
  const monthEnd=monthEndDate.toISOString().split('T')[0];
  const activeDriverNames=drivers.filter(d=>{
    const start=d.employment_start||'';
    const end=d.employment_end||'';
    if(start&&start>monthEnd)return false; // started after this month
    if(end&&end<monthStart)return false; // ended before this month
    return true;
  }).map(d=>`${d.first_name} ${d.last_name}`);
  // Combine active drivers with any existing records (in case of drivers no longer active or manual entries)
  const allNames=[...new Set([...activeDriverNames,...monthRecords.map(p=>p.driver_name).filter(Boolean)])].sort((a,b)=>a.localeCompare(b));
  const rows=allNames.map(name=>({name,record:monthRecords.find(p=>p.driver_name===name)||null}));
  const totalGross=monthRecords.reduce((s,p)=>s+(parseFloat(p.amount_gross)||0),0);
  const totalNet=monthRecords.reduce((s,p)=>s+(parseFloat(p.amount_net)||0),0);

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
      <h1 style={{fontSize:18,fontWeight:500,margin:0}}>Ewidencja wynagrodzeń</h1>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <button style={{...C.btn,padding:'6px 10px'}} onClick={()=>{
          let y=parseInt(selYear),m=parseInt(selMM)-1;if(m<1){m=12;y--;}
          setSelMonth(`${y}-${String(m).padStart(2,'0')}`);
        }}><i className="ti ti-chevron-left"/></button>
        <select style={{...C.inp,width:130}} value={selMM} onChange={e=>setSelMonth(`${selYear}-${e.target.value}`)}>
          {names.map((n,i)=><option key={n} value={String(i+1).padStart(2,'0')}>{n}</option>)}
        </select>
        <select style={{...C.inp,width:90}} value={selYear} onChange={e=>setSelMonth(`${e.target.value}-${selMM}`)}>
          {Array.from({length:7},(_,i)=>parseInt(today().slice(0,4))-3+i).map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <button style={{...C.btn,padding:'6px 10px'}} onClick={()=>{
          let y=parseInt(selYear),m=parseInt(selMM)+1;if(m>12){m=1;y++;}
          setSelMonth(`${y}-${String(m).padStart(2,'0')}`);
        }}><i className="ti ti-chevron-right"/></button>
        <button style={C.btnP} onClick={()=>{setForm({month:selMonth,date:today(),paid:false});setModal(true)}}><i className="ti ti-plus"/> Dodaj wpis</button>
      </div>
    </div>

    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
      <div style={C.stat}><div style={{fontSize:10,color:'#888'}}>Suma brutto — {monthLabel}</div><div style={{fontSize:18,fontWeight:500}}>{totalGross.toFixed(2)} zł</div></div>
      <div style={C.stat}><div style={{fontSize:10,color:'#888'}}>Suma netto — {monthLabel}</div><div style={{fontSize:18,fontWeight:500}}>{totalNet.toFixed(2)} zł</div></div>
      <div style={C.stat}><div style={{fontSize:10,color:'#888'}}>Liczba wpisów</div><div style={{fontSize:18,fontWeight:500}}>{monthRecords.length}</div></div>
    </div>

    <div style={C.card}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr>{['Kierowca','Brutto','Netto','Data wypłaty','Status','Notatka','Dok.',''].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
      <tbody>{rows.map(({name,record:p})=>(<tr key={name}>
        <td style={C.td}><strong style={{fontWeight:500}}>{name}</strong></td>
        <td style={C.td}>{p?.amount_gross?`${parseFloat(p.amount_gross).toFixed(2)} zł`:'–'}</td>
        <td style={C.td}>{p?.amount_net?`${parseFloat(p.amount_net).toFixed(2)} zł`:'–'}</td>
        <td style={C.td}>{p?.date||'–'}</td>
        <td style={C.td}>{p?
          <button onClick={()=>setPayroll(pr=>pr.map(x=>x.id===p.id?{...x,paid:!x.paid}:x))} style={{...bdg(p.paid?'green':'red'),cursor:'pointer',border:'none',padding:'2px 8px',borderRadius:20,fontSize:10}}>{p.paid?'✓ Wypłacone':'✗ Niewypłacone'}</button>
          :<span style={bdg('gray')}>Brak wpisu</span>}</td>
        <td style={{...C.td,maxWidth:200}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p?.note||'–'}</div></td>
        <td style={C.td}>{p?.documents?.length?<span style={{display:'flex',gap:3,flexWrap:'wrap'}}>{p.documents.map(d=><button key={d.id} style={{...C.btn,padding:'2px 5px',color:'#185FA5'}} onClick={()=>setPdfPreview({data:d.data,name:d.name})} title={d.description||d.name}><i className="ti ti-file-type-pdf"/></button>)}</span>:<span style={{color:'#aaa',fontSize:10}}>–</span>}</td>
        <td style={C.td}>{p?
          <><button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm(p);setModal(true)}}><i className="ti ti-edit"/></button><button style={{...C.btn,padding:'2px 5px',marginLeft:3}} onClick={()=>setPayroll(pr=>pr.filter(x=>x.id!==p.id))}><i className="ti ti-trash"/></button></>
          :<button style={{...C.btn,padding:'2px 5px',color:'#3B6D11'}} title="Dodaj wpis dla tego kierowcy" onClick={()=>{setForm({month:selMonth,date:today(),paid:false,driver_name:name});setModal(true)}}><i className="ti ti-edit"/></button>}</td>
      </tr>))}</tbody>
    </table>{rows.length===0&&<div style={{textAlign:'center',padding:20,color:'#888',fontSize:11}}>Brak aktywnych kierowców i wpisów dla {monthLabel}.</div>}</div>

    {modal&&<Modal title={form.id?'Edytuj wpis':'Nowy wpis wynagrodzenia'} onClose={()=>setModal(false)}>
      <div style={C.g2}>
        <div><label style={C.lbl}>Kierowca</label><select style={C.inp} value={form.driver_name||''} onChange={e=>setForm(p=>({...p,driver_name:e.target.value}))}>
          <option value="">Wybierz...</option>
          {drivers.map(d=>{const dn=`${d.first_name} ${d.last_name}`;return<option key={d.id} value={dn}>{dn}</option>;})}
          {form.driver_name&&!drivers.some(d=>`${d.first_name} ${d.last_name}`===form.driver_name)&&<option value={form.driver_name}>{form.driver_name} (nieaktywny/usunięty)</option>}
        </select></div>
        <div><label style={C.lbl}>Miesiąc</label><input style={C.inp} type="month" value={form.month||selMonth} onChange={e=>setForm(p=>({...p,month:e.target.value}))}/></div>
        {F('amount_gross','Kwota brutto (zł)','number')}
        {F('amount_net','Kwota netto (zł)','number')}
        {F('date','Data wypłaty','date')}
        <div style={{display:'flex',alignItems:'center',gap:7,paddingTop:18}}><input type="checkbox" id="payroll-paid" checked={form.paid||false} onChange={e=>setForm(p=>({...p,paid:e.target.checked}))} style={{width:14,height:14,cursor:'pointer'}}/><label htmlFor="payroll-paid" style={{fontSize:12,cursor:'pointer'}}>Wypłacone</label></div>
        {F('note','Notatka',undefined,true)}
      </div>

      <div style={{marginTop:12,borderTop:'0.5px solid rgba(0,0,0,0.08)',paddingTop:12}}>
        <div style={C.secT}>Dokumenty (PDF/zdjęcia)</div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
          <label style={{...C.btnP,cursor:'pointer',position:'relative',overflow:'hidden'}}>{fileLoading?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Wczytywanie...</>:<><i className="ti ti-upload"/> Wgraj PDF/zdjęcia</>}<input type="file" multiple accept=".pdf,application/pdf,image/*" onChange={addDoc} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={fileLoading}/></label>
          <label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-camera"/> Zrób zdjęcie<input type="file" accept="image/*" capture="environment" onChange={addDoc} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={fileLoading}/></label>
        </div>
        {(form.documents||[]).length>0&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
          {form.documents.map(d=>(
            <div key={d.id} style={{display:'flex',gap:7,alignItems:'center',background:'#f5f4f0',border:'0.5px solid rgba(0,0,0,0.08)',borderRadius:7,padding:'6px 9px'}}>
              <i className="ti ti-file-type-pdf" style={{color:'#A32D2D',fontSize:16}}/>
              <span style={{fontSize:11,whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}}>{d.name}</span>
              <input style={{...C.inp,flex:1}} placeholder="Opis dokumentu..." value={d.description} onChange={e=>updDocDesc(d.id,e.target.value)}/>
              <button style={{...C.btn,padding:'3px 6px',color:'#185FA5'}} onClick={()=>setPdfPreview({data:d.data,name:d.name})} title="Podgląd"><i className="ti ti-eye"/></button>
              <button style={{...C.btn,padding:'3px 6px'}} onClick={()=>remDoc(d.id)}><i className="ti ti-trash"/></button>
            </div>
          ))}
        </div>}
        {(form.documents||[]).length===0&&<div style={{fontSize:11,color:'#aaa'}}>Brak wgranych dokumentów.</div>}
      </div>

      <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:12,position:'sticky',bottom:0,background:'#fff',paddingTop:10,paddingBottom:6,borderTop:'0.5px solid rgba(0,0,0,0.08)'}}><button style={C.btn} onClick={()=>setModal(false)}>Anuluj</button><button style={C.btnP} onClick={save}>Zapisz</button></div>
    </Modal>}
    {pdfPreview&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10001}} onClick={()=>setPdfPreview(null)}>
      <div style={{background:'#fff',borderRadius:14,padding:14,maxWidth:760,width:'95%',maxHeight:'90vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div style={{fontSize:13,fontWeight:500}}><i className="ti ti-file-type-pdf" style={{color:'#A32D2D',marginRight:5}}/>{pdfPreview.name}</div><button style={{...C.btn,padding:'2px 6px'}} onClick={()=>setPdfPreview(null)}><i className="ti ti-x"/></button></div>
        {pdfPreview.data&&pdfPreview.data.startsWith('data:application/pdf')
          ? <iframe src={pdfPreview.data} style={{width:'100%',height:'75vh',border:'0.5px solid rgba(0,0,0,0.1)',borderRadius:7}}/>
          : <img src={pdfPreview.data} style={{width:'100%',maxHeight:'75vh',objectFit:'contain',borderRadius:7}}/>}
      </div>
    </div>}
  </div>);
};


const Vehicles=({db,onGoToRepairs})=>{
  const [vehicles,setVehicles]=db.vehicles;
  const [insurance,setInsurance]=db.insurance;
  const [repairs]=db.repairs;
  const [modal,setModal]=useState(null);
  const [insModal,setInsModal]=useState(null);
  const [insDocPreview,setInsDocPreview]=useState(null);
  const [polisaPreview,setPolisaPreview]=useState(null);
  const [regDocPreview,setRegDocPreview]=useState(null);
  const [form,setForm]=useState({});
  const [insForm,setInsForm]=useState({});
  const [insFileLoading,setInsFileLoading]=useState(false);
  const [regDocsLoading,setRegDocsLoading]=useState(false);

  // reg_docs stored separately to avoid Supabase overwrite
  const [regDocsMap,setRegDocsMap]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('tm_reg_docs')||'{}');}catch{return {};}
  });
  const saveRegDocsMap=m=>{setRegDocsMap(m);localStorage.setItem('tm_reg_docs',JSON.stringify(m));};

  const addRegDoc=async(files,vehicleId)=>{
    setRegDocsLoading(true);
    const list=Array.from(files);
    let remaining=list.length;
    list.forEach(f=>{
      if(f.type.startsWith('image/')){
        const img=new Image();const url=URL.createObjectURL(f);
        img.onload=()=>{
          const maxW=1200;const scale=Math.min(1,maxW/img.width);
          const canvas=document.createElement('canvas');canvas.width=img.width*scale;canvas.height=img.height*scale;
          canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
          const data=canvas.toDataURL('image/jpeg',0.8);
          URL.revokeObjectURL(url);
          setRegDocsMap(prev=>{
            const updated={...prev,[vehicleId]:[...(prev[vehicleId]||[]),{id:gid(),name:f.name,data}]};
            localStorage.setItem('tm_reg_docs',JSON.stringify(updated));
            return updated;
          });
          remaining--;if(remaining===0)setRegDocsLoading(false);
        };img.src=url;
      }else{
        const rd=new FileReader();
        rd.onload=ev=>{
          setRegDocsMap(prev=>{
            const updated={...prev,[vehicleId]:[...(prev[vehicleId]||[]),{id:gid(),name:f.name,data:ev.target.result}]};
            localStorage.setItem('tm_reg_docs',JSON.stringify(updated));
            return updated;
          });
          remaining--;if(remaining===0)setRegDocsLoading(false);
        };
        rd.onerror=()=>{remaining--;if(remaining===0)setRegDocsLoading(false);};
        rd.readAsDataURL(f);
      }
    });
  };

  const remRegDoc=(vehicleId,docId)=>{
    setRegDocsMap(prev=>{
      const updated={...prev,[vehicleId]:(prev[vehicleId]||[]).filter(d=>d.id!==docId)};
      localStorage.setItem('tm_reg_docs',JSON.stringify(updated));
      return updated;
    });
  };
  const saveV=()=>{if(modal==='add')setVehicles(p=>[...p,{...form,id:gid()}]);else setVehicles(p=>p.map(x=>x.id===form.id?{...x,...form}:x));setModal(null)};
  const saveI=()=>{if(insModal==='add')setInsurance(p=>[...p,{...insForm,id:gid()}]);else setInsurance(p=>p.map(x=>x.id===insForm.id?{...x,...insForm}:x));setInsModal(null)};
  const F=(k,l,t='text')=><div><label style={C.lbl}>{l}</label><input style={C.inp} type={t} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>;
  const FI=(k,l,t='text')=><div><label style={C.lbl}>{l}</label><input style={C.inp} type={t} value={insForm[k]||''} onChange={e=>setInsForm(p=>({...p,[k]:e.target.value}))}/></div>;
  const iS=exp=>{const d=daysUntil(exp);if(d===null)return null;if(d<0)return{l:'Wygasłe',c:'red'};if(d<=7)return{l:`${d}d`,c:'red'};if(d<=30)return{l:`${d}d`,c:'amber'};return{l:'OK',c:'green'}};
  const tL=t=>t==='oc'?'OC':t==='ac'?'AC':t==='oc_ac'?'OC/AC':'Przegląd';
  const getI=reg=>insurance.filter(i=>i.vehicle_reg===reg);
  const hInsFile=async e=>{
    const files=Array.from(e.target.files);if(!files.length)return;setInsFileLoading(true);
    let remaining=files.length;
    const done=()=>{remaining--;if(remaining===0)setInsFileLoading(false);};
    for(const file of files){
      try{
        if(file.type.startsWith('image/')){
          const img=new Image();const url=URL.createObjectURL(file);
          await new Promise(res=>{
            img.onload=()=>{
              const maxW=1200;const scale=Math.min(1,maxW/img.width);
              const cv=document.createElement('canvas');cv.width=img.width*scale;cv.height=img.height*scale;
              cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
              setInsForm(p=>({...p,polisa_docs:[...(p.polisa_docs||[]),{id:gid(),name:file.name,data:cv.toDataURL('image/jpeg',0.75)}]}));
              URL.revokeObjectURL(url);res();
            };
            img.onerror=()=>{URL.revokeObjectURL(url);res();};
            img.src=url;
          });
        }else{
          const buf=await file.arrayBuffer();
          if(!window.pdfjsLib){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}
          const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;const page=await pdf.getPage(1);const vp=page.getViewport({scale:1.5});const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
          setInsForm(p=>({...p,polisa_docs:[...(p.polisa_docs||[]),{id:gid(),name:file.name,data:cv.toDataURL('image/jpeg',0.82)}]}));
        }
      }catch(err){console.error(err);}
    }
    setInsFileLoading(false);e.target.value='';
  };
  return(<div>
    {vehicles.map(v=>{
      const vi=getI(v.registration);
      const oc=vi.find(i=>i.type==='oc'||i.type==='oc_ac'),ac=vi.find(i=>i.type==='ac'||i.type==='oc_ac'),tech=vi.find(i=>i.type==='przeglad');
      const planned=repairs.filter(r=>r.vehicle_reg===v.registration&&r.status==='zaplanowana');
      return(<div key={v.id} style={C.card}>
        {/* Single header line: Reg · Brand/Model · OC/AC/Prz badges · VIN · buttons */}
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span style={{fontSize:13,fontWeight:700,whiteSpace:'nowrap'}}>{v.registration}</span>
          <span style={{fontSize:11,color:'#666',whiteSpace:'nowrap'}}>{v.brand} {v.model}{v.year?` · ${v.year}`:''}</span>
          {[{l:'OC',ins:oc},{l:'AC',ins:ac},{l:'Prz.',ins:tech}].map(({l,ins})=>{
            const s=ins?iS(ins.expiry_date):null;
            return<span key={l} onClick={ins?()=>setPolisaPreview(ins):undefined}
              style={{...bdg(s?s.c:'gray'),fontSize:9,padding:'1px 5px',cursor:ins?'pointer':'default',opacity:ins?1:0.35}}
              title={ins?`${tL(ins.type)} — ważne do ${ins.expiry_date||'?'}`:undefined}>
              {l}{s?`: ${s.l}`:''}{ins?.polisa_img?<i className="ti ti-file-text" style={{marginLeft:3,fontSize:8}}/>:null}
            </span>;
          })}
          {v.vin&&<span style={{fontSize:9,color:'#bbb',fontFamily:'monospace',whiteSpace:'nowrap'}}>VIN {v.vin}</span>}
          {/* Spacer */}
          <div style={{flex:1}}/>
          <button style={{...C.btn,fontSize:10,padding:'2px 7px'}} onClick={()=>{setInsForm({vehicle_reg:v.registration,type:'oc'});setInsModal('add')}}><i className="ti ti-shield-plus"/></button>
          <button style={{...C.btn,fontSize:10,padding:'2px 7px'}} onClick={()=>{const tech_items=v.tech_items||DEFAULT_TECH_ITEMS.map(l=>({id:l,label:l,rating:null,ratingType:'1-5',note:''}));setForm({...v,tech_items});setModal('tech');}} title="Stan techniczny"><i className="ti ti-clipboard-check"/></button>
          <button style={{...C.btn,fontSize:10,padding:'2px 7px'}} onClick={()=>onGoToRepairs&&onGoToRepairs(v.registration)} title="Naprawy"><i className="ti ti-tool"/></button>
          <button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm(v);setModal('edit')}}><i className="ti ti-edit"/></button>
          <button style={{...C.btn,padding:'2px 5px'}} onClick={()=>setVehicles(p=>p.filter(x=>x.id!==v.id))}><i className="ti ti-trash"/></button>
        </div>
        {planned.length>0&&<div style={{marginTop:7,borderTop:'0.5px solid rgba(0,0,0,0.07)',paddingTop:6,display:'flex',gap:5,flexWrap:'wrap'}}>
          {planned.map(r=><div key={r.id} style={{background:'#E6F1FB',border:'0.5px solid #B5D4F4',borderRadius:6,padding:'3px 8px',fontSize:10}}><span style={{fontWeight:500,color:'#185FA5'}}>{r.repair_type||'Naprawa'}</span><span style={{color:'#888',marginLeft:5}}>{r.date}</span></div>)}
        </div>}

        {/* Reg docs — stored in tm_reg_docs localStorage, independent of Supabase */}
        {(()=>{const vDocs=(regDocsMap[v.id]||[]).length>0?regDocsMap[v.id]:(v.reg_docs||[]);return(
        <div style={{marginTop:7,borderTop:'0.5px solid rgba(0,0,0,0.07)',paddingTop:7}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <div style={{fontSize:9,fontWeight:500,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em'}}>
              Dowód rejestracyjny {vDocs.length?`(${vDocs.length})` : ''}
            </div>
            <div style={{display:'flex',gap:5}}>
              <label style={{...C.btn,fontSize:10,cursor:'pointer',position:'relative',overflow:'hidden'}}>
                {regDocsLoading?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Wczytywanie...</>:<><i className="ti ti-upload"/> Wgraj</>}
                <input type="file" multiple accept=".pdf,application/pdf,image/*" onChange={e=>{if(e.target.files.length)addRegDoc(e.target.files,v.id);e.target.value='';}} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={regDocsLoading}/>
              </label>
              <label style={{...C.btn,fontSize:10,cursor:'pointer',position:'relative',overflow:'hidden'}}>
                <i className="ti ti-camera"/> Zdjęcie
                <input type="file" accept="image/*" capture="environment" onChange={e=>{if(e.target.files.length)addRegDoc(e.target.files,v.id);e.target.value='';}} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={regDocsLoading}/>
              </label>
            </div>
          </div>
          {vDocs.length>0
            ?<div style={{display:'flex',flexDirection:'column',gap:4}}>
              {vDocs.map(d=>(
                <div key={d.id} style={{display:'flex',gap:7,alignItems:'center',background:'#f5f4f0',borderRadius:6,padding:'4px 9px',fontSize:11}}>
                  <i className={d.data?.startsWith('data:image')?'ti ti-photo':'ti ti-file-type-pdf'} style={{color:'#185FA5',fontSize:13}}/>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>{d.name}</span>
                  <button style={{...C.btn,padding:'2px 5px',color:'#185FA5'}} onClick={()=>setRegDocPreview(d)}><i className="ti ti-eye"/></button>
                  <button style={{...C.btn,padding:'2px 5px'}} onClick={()=>remRegDoc(v.id,d.id)}><i className="ti ti-trash"/></button>
                </div>
              ))}
            </div>
            :<div style={{fontSize:11,color:'#aaa'}}>Brak dokumentów.</div>
          }
        </div>);})()}
      </div>);
    })}
    {vehicles.length===0&&<div style={{...C.card,textAlign:'center',padding:28,color:'#888',fontSize:11}}>Brak pojazdów.</div>}
    {polisaPreview&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10000}} onClick={()=>setPolisaPreview(null)}>
      <div style={{background:'#fff',borderRadius:14,padding:20,width:500,maxHeight:'90vh',overflowY:'auto',boxSizing:'border-box'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:13,fontWeight:500}}>{tL(polisaPreview.type)} — {polisaPreview.vehicle_reg}</div><button style={{...C.btn,padding:'2px 6px'}} onClick={()=>setPolisaPreview(null)}><i className="ti ti-x"/></button></div>
        <div style={C.g2}>
          <div style={C.stat}><div style={{fontSize:9,color:'#888'}}>Typ</div><div style={{fontWeight:500}}>{tL(polisaPreview.type)}</div></div>
          <div style={C.stat}><div style={{fontSize:9,color:'#888'}}>Firma</div><div style={{fontWeight:500}}>{polisaPreview.company||'–'}</div></div>
          <div style={C.stat}><div style={{fontSize:9,color:'#888'}}>Nr polisy</div><div style={{fontFamily:'monospace',fontSize:11}}>{polisaPreview.policy_number||'–'}</div></div>
          <div style={C.stat}><div style={{fontSize:9,color:'#888'}}>Składka</div><div style={{fontWeight:500}}>{polisaPreview.cost?`${polisaPreview.cost} zł`:'–'}</div></div>
          <div style={C.stat}><div style={{fontSize:9,color:'#888'}}>Data od</div><div style={{fontWeight:500}}>{polisaPreview.start_date||'–'}</div></div>
          <div style={{...C.stat,background:iS(polisaPreview.expiry_date)?.c==='red'?'#FCEBEB':iS(polisaPreview.expiry_date)?.c==='amber'?'#FAEEDA':'#f5f4f0'}}><div style={{fontSize:9,color:'#888'}}>Ważna do</div><div style={{fontWeight:500}}>{polisaPreview.expiry_date||'–'}</div></div>
        </div>
        {(()=>{
          const docs=polisaPreview.polisa_docs||[];
          const legacyImg=polisaPreview.polisa_img&&!docs.find(d=>d.data===polisaPreview.polisa_img)?[{id:'legacy',name:polisaPreview.polisa_name||'Dokument',data:polisaPreview.polisa_img}]:[];
          const allDocs=[...legacyImg,...docs];
          if(!allDocs.length)return null;
          return<div style={{marginTop:12,borderTop:'0.5px solid rgba(0,0,0,0.08)',paddingTop:10}}>
            <div style={{fontSize:10,fontWeight:500,color:'#888',marginBottom:6}}>Dokumenty ({allDocs.length})</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {allDocs.map(d=><div key={d.id} style={{display:'flex',gap:7,alignItems:'center',background:'#f5f4f0',borderRadius:6,padding:'5px 9px',fontSize:11}}>
                <i className={d.data?.startsWith('data:image')?'ti ti-photo':'ti ti-file-type-pdf'} style={{color:'#185FA5'}}/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                <button style={{...C.btn,padding:'2px 5px',color:'#185FA5'}} onClick={()=>setInsDocPreview(d)}><i className="ti ti-eye"/> Podgląd</button>
              </div>)}
            </div>
          </div>;
        })()}
        <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:12}}>
          <button style={{...C.btn,color:'#A32D2D'}} onClick={()=>{setInsurance(p=>p.filter(x=>x.id!==polisaPreview.id));setPolisaPreview(null)}}><i className="ti ti-trash"/> Usuń</button>
          <button style={C.btn} onClick={()=>{setInsForm(polisaPreview);setInsModal('edit');setPolisaPreview(null)}}><i className="ti ti-edit"/> Edytuj</button>
          <button style={C.btnP} onClick={()=>setPolisaPreview(null)}>Zamknij</button>
        </div>
      </div>
    </div>}

          const rLabel=(r,rt)=>{if(!r&&r!==0)return null;if(rt==='ok-brak')return r;const n=parseInt(r);return n===5?'Dobry':n===4?'OK':n===3?'Uważaj':n===2?'Słaby':'Krytyczny';};
          const rColor=(r,rt)=>{if(!r&&r!==0)return'#aaa';if(rt==='ok-brak')return r==='Sprawne'?'#3B6D11':'#A32D2D';const n=parseInt(r);return n>=4?'#3B6D11':n>=2?'#854F0B':'#A32D2D';};
          return(<div key={item.id} style={{background:'#f5f4f0',borderRadius:9,padding:'8px 10px',border:'0.5px solid rgba(0,0,0,0.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>

              <RatingBtn val={item.rating} cur={item.rating} rt={item.ratingType||'1-5'} onSet={v=>upItem('rating',v)}/>
              {item.rating!==null&&item.rating!==undefined&&<span style={{fontSize:10,fontWeight:600,color:rColor(item.rating,item.ratingType),minWidth:52}}>{rLabel(item.rating,item.ratingType)}</span>}
              <input style={{...C.inp,width:130,fontSize:10}} value={item.note||''} placeholder="Notatka..." onChange={e=>upItem('note',e.target.value)}/>
              <button style={{...C.btn,padding:'2px 5px',fontSize:10}} onClick={addSub} title="Dodaj podpunkt"><i className="ti ti-plus"/></button>
              <button style={{...C.btn,padding:'2px 5px'}} onClick={()=>setForm(p=>({...p,tech_items:p.tech_items.filter((_,j)=>j!==i)}))}><i className="ti ti-trash"/></button>
            </div>
            {(item.subs||[]).map((sub,si)=>(
              <div key={sub.id} style={{display:'flex',alignItems:'center',gap:7,marginTop:6,paddingLeft:16,flexWrap:'wrap'}}>
                <div style={{width:3,height:20,borderRadius:2,background:'#ccc',flexShrink:0}}/>
                <input style={{...C.inp,flex:1,minWidth:80,fontSize:11}} value={sub.label} placeholder="Podpunkt..." onChange={e=>upSub(si,'label',e.target.value)}/>
                <select style={{...C.inp,width:95,fontSize:10}} value={sub.ratingType||item.ratingType||'1-5'} onChange={e=>upSub(si,'ratingType',e.target.value)}>
                  <option value="1-5">Skala 1–5</option>

                </select>
                <RatingBtn val={sub.rating} cur={sub.rating} rt={sub.ratingType||item.ratingType||'1-5'} onSet={v=>upSub(si,'rating',v)}/>
                {sub.rating!==null&&sub.rating!==undefined&&<span style={{fontSize:10,fontWeight:600,color:rColor(sub.rating,sub.ratingType||item.ratingType),minWidth:52}}>{rLabel(sub.rating,sub.ratingType||item.ratingType)}</span>}
                <input style={{...C.inp,width:120,fontSize:10}} value={sub.note||''} placeholder="Notatka..." onChange={e=>upSub(si,'note',e.target.value)}/>

    {insModal&&<Modal title="Dodaj / edytuj ubezpieczenie" onClose={()=>setInsModal(null)} wide>

        <div><label style={C.lbl}>Pojazd</label><select style={C.inp} value={insForm.vehicle_reg||''} onChange={e=>setInsForm(p=>({...p,vehicle_reg:e.target.value}))}><option value="">Wybierz...</option>{vehicles.map(v=><option key={v.id}>{v.registration}</option>)}</select></div>
        {FI('company','Firma')}{FI('policy_number','Nr polisy')}{FI('start_date','Data od','date')}{FI('expiry_date','Ważna do','date')}{FI('cost','Składka (zł)')}
      </div>
      <div style={{marginTop:12,borderTop:'0.5px solid rgba(0,0,0,0.08)',paddingTop:12}}>
        <div style={C.secT}>Dokumenty polisy ({(insForm.polisa_docs||[]).length+(insForm.polisa_img?1:0)})</div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
          <label style={{...C.btnP,cursor:'pointer',position:'relative',overflow:'hidden'}}>
            {insFileLoading?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Wczytywanie...</>:<><i className="ti ti-upload"/> Wgraj PDF/zdjęcie</>}

        {insForm.polisa_img&&!(insForm.polisa_docs||[]).find(d=>d.data===insForm.polisa_img)&&(
          <div style={{display:'flex',gap:7,alignItems:'center',background:'#f5f4f0',borderRadius:6,padding:'5px 9px',marginBottom:4,fontSize:11}}>

          </div>

        {/* Multi-docs */}
        {(insForm.polisa_docs||[]).map(d=>(
          <div key={d.id} style={{display:'flex',gap:7,alignItems:'center',background:'#f5f4f0',borderRadius:6,padding:'5px 9px',marginBottom:4,fontSize:11}}>

// REPAIRS


const DEFAULT_REPAIR_TYPES=['Silnik','Hamulce','Zawieszenie','Elektryk','Klimatyzacja','Oleje/płyny','Opony','Karoseria','Inne'];
const Repairs=({db,initialFilter,onFilterApplied})=>{
  const [repairs,setRepairs]=db.repairs;
  const [vehicles]=db.vehicles;
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [fV,setFV]=useState('');const [fT,setFT]=useState('');const [fS,setFS]=useState('');const [fDF,setFDF]=useState('');const [fDT,setFDT]=useState('');
  useEffect(()=>{
    if(initialFilter?.vehicle){setFV(initialFilter.vehicle);onFilterApplied&&onFilterApplied();}
  },[initialFilter]);
  const [repairTypes,setRepairTypes]=useStore('tm_repair_types',DEFAULT_REPAIR_TYPES);
  const [newType,setNewType]=useState('');
  const [manualType,setManualType]=useState(false);
  const [invLoading,setInvLoading]=useState(false);
  const save=()=>{if(form.id)setRepairs(p=>p.map(x=>x.id===form.id?{...x,...form}:x));else setRepairs(p=>[...p,{...form,id:gid(),created_at:today()}]);setModal(false)};
  const hInv=async e=>{const file=e.target.files[0];if(!file)return;setInvLoading(true);
    try{if(file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf')){
      const buf=await file.arrayBuffer();if(!window.pdfjsLib){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}
      const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;const page=await pdf.getPage(1);const vp=page.getViewport({scale:0.8});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      setForm(p=>({...p,invoice_img:canvas.toDataURL('image/jpeg',0.85),invoice_name:file.name,invoice_file_type:'pdf'}));
    }else{const rd=new FileReader();rd.onload=ev=>setForm(p=>({...p,invoice_img:ev.target.result,invoice_name:file.name,invoice_file_type:'image'}));rd.readAsDataURL(file);}
    }catch(err){alert('Błąd: '+err.message);}setInvLoading(false);e.target.value='';};
  const addRT=()=>{const t=newType.trim();if(!t||repairTypes.includes(t))return;setRepairTypes(p=>[...p,t]);setNewType('')};
  const remRT=t=>{setRepairTypes(p=>p.filter(x=>x!==t));if(form.repair_type===t)setForm(p=>({...p,repair_type:''}))};
  const F=(k,l,t='text',full=false)=>(<div style={full?{gridColumn:'span 2'}:{}}><label style={C.lbl}>{l}</label>{t==='textarea'?<textarea style={{...C.inp,height:60,resize:'vertical'}} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/>:<input style={C.inp} type={t} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/>}</div>);
  const anyF=fV||fT||fS||fDF||fDT;
  const filtered=repairs.filter(r=>{
    if(fV&&r.vehicle_reg!==fV)return false;if(fT&&r.repair_type!==fT)return false;
    if(fS&&(r.status||'nowa')!==fS)return false;if(fDF&&(r.date||'')<fDF)return false;if(fDT&&(r.date||'')>fDT)return false;return true;
  });
  const total=filtered.reduce((s,r)=>s+(parseFloat(r.cost)||0),0);
  const totalNet=filtered.reduce((s,r)=>s+(parseFloat(r.cost_net)||0),0);
  const sc=s=>s==='zakończona'?'green':s==='w toku'?'amber':s==='zaplanowana'?'blue':'gray';
  const usedV=[...new Set(repairs.map(r=>r.vehicle_reg).filter(Boolean))].sort();
  const usedT=[...new Set(repairs.map(r=>r.repair_type).filter(Boolean))].sort();
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><h1 style={{fontSize:18,fontWeight:500,margin:0}}>Rejestr napraw</h1><button style={C.btnP} onClick={()=>{setForm({date:today(),status:'nowa'});setManualType(false);setModal(true)}}><i className="ti ti-plus"/> Dodaj</button></div>
    <div style={{...C.card,marginBottom:10,padding:'10px 14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{fontSize:10,fontWeight:500,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em'}}><i className="ti ti-filter" style={{marginRight:4}}/>Filtry</span>{anyF&&<button style={{...C.btn,fontSize:10,padding:'1px 7px',color:'#A32D2D'}} onClick={()=>{setFV('');setFT('');setFS('');setFDF('');setFDT('')}}><i className="ti ti-x"/> Wyczyść</button>}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:7}}>
        <div><label style={C.lbl}>Pojazd</label><select style={C.inp} value={fV} onChange={e=>setFV(e.target.value)}><option value="">Wszystkie</option>{usedV.map(v=><option key={v}>{v}</option>)}</select></div>
        <div><label style={C.lbl}>Typ</label><select style={C.inp} value={fT} onChange={e=>setFT(e.target.value)}><option value="">Wszystkie</option>{usedT.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label style={C.lbl}>Status</label><select style={C.inp} value={fS} onChange={e=>setFS(e.target.value)}><option value="">Wszystkie</option><option value="zaplanowana">Zaplanowana</option><option value="nowa">Nowa</option><option value="w toku">W toku</option><option value="zakończona">Zakończona</option></select></div>
        <div><label style={C.lbl}>Data od</label><input style={C.inp} type="date" value={fDF} onChange={e=>setFDF(e.target.value)}/></div>
        <div><label style={C.lbl}>Data do</label><input style={C.inp} type="date" value={fDT} onChange={e=>setFDT(e.target.value)}/></div>
      </div>
      {anyF&&<div style={{marginTop:6,fontSize:10,color:'#888'}}>Wyniki: <strong style={{color:'#1a1a18'}}>{filtered.length}</strong> z {repairs.length}</div>}
    </div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8,gap:8}}>
      <div style={{...C.stat,fontSize:12,whiteSpace:'nowrap'}}><span style={{color:'#888'}}>Suma netto: </span><strong>{totalNet.toFixed(2)} zł</strong></div>
      <div style={{...C.stat,fontSize:12,whiteSpace:'nowrap'}}><span style={{color:'#888'}}>Suma brutto: </span><strong>{total.toFixed(2)} zł</strong></div>
    </div>
    <div style={C.card}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr>{['Data','Pojazd','Opis','Typ','Warsztat','Netto','Brutto','Status','Faktura',''].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
      <tbody>{filtered.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(r=>(<tr key={r.id}>
        <td style={C.td}>{r.date}</td><td style={C.td}><strong style={{fontWeight:500}}>{r.vehicle_reg}</strong></td>
        <td style={{...C.td,maxWidth:120}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.description}</div></td>
        <td style={C.td}>{r.repair_type}</td><td style={C.td}>{r.workshop}</td>
        <td style={C.td}>{r.cost_net?`${parseFloat(r.cost_net).toFixed(2)} zł`:'–'}</td>
        <td style={C.td}>{r.cost?`${parseFloat(r.cost).toFixed(2)} zł`:'–'}</td>
        <td style={C.td}><span style={bdg(sc(r.status))}>{r.status||'nowa'}</span></td>
        <td style={C.td}>{r.invoice_img?<span style={{...bdg('blue'),cursor:'pointer'}} onClick={()=>{setForm(r);setManualType(!repairTypes.includes(r.repair_type)&&!!r.repair_type);setModal(true)}}><i className="ti ti-receipt" style={{marginRight:2}}/>Faktura</span>:<span style={{color:'#aaa',fontSize:10}}>–</span>}</td>
        <td style={C.td}><button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm(r);setManualType(!repairTypes.includes(r.repair_type)&&!!r.repair_type);setModal(true)}}><i className="ti ti-edit"/></button><button style={{...C.btn,padding:'2px 5px',marginLeft:3}} onClick={()=>setRepairs(p=>p.filter(x=>x.id!==r.id))}><i className="ti ti-trash"/></button></td>
      </tr>))}</tbody>
    </table>{filtered.length===0&&<div style={{textAlign:'center',padding:20,color:'#888',fontSize:11}}>Brak wyników</div>}</div>
    {modal&&<Modal title={form.id?'Edytuj naprawę':'Dodaj naprawę'} onClose={()=>setModal(false)} wide>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

};

  const hPdf=async e=>{const file=e.target.files[0];if(!file)return;setPdfLoading(true);
    try{

        const img=new Image();const url=URL.createObjectURL(file);
        img.onload=()=>{

      const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;const page=await pdf.getPage(1);const vp=page.getViewport({scale:1.5});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      setForm(p=>({...p,order_pdf_page1:canvas.toDataURL('image/jpeg',0.82),order_pdf_name:file.name,order_pdf_pages:pdf.numPages}));

  const F=(k,l,t='text',full=false)=>(<div style={full?{gridColumn:'span 2'}:{}}><label style={C.lbl}>{l}</label>{t==='textarea'?<textarea style={{...C.inp,height:55,resize:'vertical'}} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/>:<input style={C.inp} type={t} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} onKeyDown={handleEnterNext}/>}</div>);

        {' '}Jeśli wiersz nie zawiera kolumny <strong>client_name</strong>, automatycznie przypisany zostanie domyślny kontrahent (oznaczony ★ w Kontrahentach){contractors.find(c=>c.is_default)?<> — <strong>{contractors.find(c=>c.is_default).name}</strong></>:<span style={{color:'#A32D2D'}}> — nie masz jeszcze ustawionego domyślnego kontrahenta, ustaw go w zakładce Kontrahenci</span>}.
        {' '}Jeśli kolumna <strong>pdf_url</strong> zawiera link do pliku PDF zlecenia na Google Drive (udostępniony "dla każdego, kto ma link"), aplikacja przy imporcie spróbuje go automatycznie wczytać — tak jakby wgrać go ręcznie w formularzu. Może się nie udać z powodu zabezpieczeń CORS Google Drive — wtedy dokument trzeba dodać ręcznie w edycji zlecenia.
      </div>
      <details style={{marginBottom:8}}>
        <summary style={{fontSize:11,cursor:'pointer',color:'#185FA5'}}>Pokaż wymagane/dostępne nazwy kolumn</summary>
        <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:5}}>
          {ORDER_IMPORT_FIELDS.map(f=><span key={f.key} style={{...bdg(f.required?'amber':'gray'),fontFamily:'monospace'}} title={f.label}>{f.key}{f.required?' *':''}</span>)}

          e.target.value='';
        }} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/></label>
        <span style={{fontSize:10,color:'#888'}}>lub wklej zawartość CSV poniżej</span>
      </div>
      <textarea style={{...C.inp,height:120,resize:'vertical',fontFamily:'monospace',fontSize:11}} placeholder="order_number,client_name,load_date,unload_date,load_address,unload_address,driver_name,vehicle_reg,kilometers,currency,rate,..." value={importText} onChange={e=>{setImportText(e.target.value);setImportPreview(null)}}/>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button style={C.btn} onClick={()=>{
          const {headers,records}=parseCSV(importText);
          if(headers.length===0||records.length===0){setImportPreview({error:'Nie znaleziono danych w CSV.'});return;}
          if(!headers.includes('order_number')){setImportPreview({error:'Brak wymaganej kolumny "order_number".'});return;}
          const unknown=headers.filter(h=>!ORDER_IMPORT_FIELDS.some(f=>f.key===h));
          const existingNumbers=new Set(orders.map(o=>o.order_number).filter(Boolean));
          const seen=new Set();
          const toImport=[];const duplicates=[];const invalid=[];
          records.forEach(r=>{
            const num=(r.order_number||'').trim();
            if(!num){invalid.push(r);return;}
            if(existingNumbers.has(num)||seen.has(num)){duplicates.push(num);return;}
            seen.add(num);
            const item={};
            ORDER_IMPORT_FIELDS.forEach(f=>{if(r[f.key]!==undefined&&r[f.key]!=='')item[f.key]=r[f.key];});
            if(!item.currency)item.currency='EUR';
            if(!item.status)item.status='nowe';
            if(!item.number)item.number=item.order_number;
            if(item.load_date)item.load_date=normalizeDate(item.load_date);
            if(item.unload_date)item.unload_date=normalizeDate(item.unload_date);
            if(!item.client_name){
              const def=contractors.find(c=>c.is_default);
              if(def){item.client_name=def.name||'';item.client_nip=def.nip||'';}
            }
            // Match vehicle_reg / driver_name to existing records so they're pre-selected in dropdowns
            if(item.vehicle_reg){
              const norm=s=>(s||'').toUpperCase().replace(/\s+/g,'');
              const v=vehicles.find(v=>norm(v.registration)===norm(item.vehicle_reg));
              if(v)item.vehicle_reg=v.registration;
            }
            if(item.driver_name){
              const norm=s=>(s||'').toLowerCase().replace(/\s+/g,' ').trim();
              const d=drivers.find(d=>norm(`${d.first_name} ${d.last_name}`)===norm(item.driver_name));
              if(d)item.driver_name=`${d.first_name} ${d.last_name}`;
            }
            // If vehicle known but driver not given, infer driver from Wyjazdy (trip covering unload_date)
            if(item.vehicle_reg&&!item.driver_name){
              const ref=item.unload_date||item.load_date||today();
              const t=trips.find(t=>t.vehicle_reg===item.vehicle_reg&&t.start_date&&t.start_date<=ref&&(!t.end_date||t.end_date>=ref));
              if(t?.driver_name)item.driver_name=t.driver_name;
            }
            toImport.push(item);
          });
          setImportPreview({headers,unknown,toImport,duplicates,invalid,total:records.length});
        }}><i className="ti ti-list-check"/> Sprawdź dane</button>
        {importPreview&&!importPreview.error&&importPreview.toImport.length>0&&<button style={C.btnP} disabled={!!importing} onClick={async()=>{
          const items=importPreview.toImport;
          const withUrl=items.filter(it=>it.pdf_url);

          for(let i=0;i<items.length;i++){
            const it=items[i];
            if(it.pdf_url){
              setImporting({done:pdfOk+pdfFail,total:withUrl.length});
              try{
                const res=await fetchPdfFirstPage(it.pdf_url);
                it.order_pdf_page1=res.order_pdf_page1;
                it.order_pdf_pages=res.order_pdf_pages;
                it.order_pdf_name=it.order_number?`Zlecenie_${it.order_number}.pdf`:'zlecenie.pdf';
                pdfOk++;
              }catch{pdfFail++;}
              delete it.pdf_url;
            }
          }
          setImporting(null);
          setOrders(p=>[...p,...items.map(item=>({...item,id:gid(),created_at:today()}))]);
          if(withUrl.length>0){
            alert(`Zaimportowano ${items.length} zleceń.\nPDF wczytane automatycznie: ${pdfOk}/${withUrl.length}${pdfFail>0?`\nNieudane (np. z powodu ograniczeń CORS Google Drive) — dodaj te dokumenty ręcznie w edycji zlecenia: ${pdfFail}`:''}`);
          }
          setImportModal(false);
        }}>{importing?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Wczytywanie PDF {importing.done}/{importing.total}...</>:<><i className="ti ti-check"/> Importuj {importPreview.toImport.length} zleceń</>}</button>}
      </div>
      {importPreview&&(
        importPreview.error
          ?<div style={{marginTop:10,fontSize:11,color:'#A32D2D'}}>{importPreview.error}</div>
          :<div style={{marginTop:10,fontSize:11}}>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:8}}>
              <span style={bdg('green')}>Do importu: {importPreview.toImport.length}</span>
              {importPreview.duplicates.length>0&&<span style={bdg('amber')}>Pominięte duplikaty: {importPreview.duplicates.length}</span>}
              {importPreview.invalid.length>0&&<span style={bdg('red')}>Bez nr zlecenia: {importPreview.invalid.length}</span>}
              {importPreview.unknown.length>0&&<span style={bdg('gray')}>Nierozpoznane kolumny: {importPreview.unknown.join(', ')}</span>}
            </div>
            {importPreview.toImport.length>0&&<div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                <thead><tr>{['Nr zlecenia','Klient','Załadunek','Rozładunek','Kierowca','Pojazd','Stawka'].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
                <tbody>{importPreview.toImport.slice(0,10).map((it,i)=>(

            </div>}
          </div>
      )}
    </Modal>}
  </div>);
};

const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const generateKSeFXML=(inv,company)=>{
  const ts=new Date().toISOString().replace(/\.\d{3}Z$/,'+00:00');
  const issueDate=inv.issue_date||today();
  const saleDate=inv.sale_date||issueDate;
  const currency=inv.currency||'EUR';
  const isEUR=currency==='EUR';
  const rate=parseFloat(inv.eur_rate)||0;
  const items=inv.items||[];
  const docType=inv.doc_type||'faktura';

  // Build invoice lines
  const lines=items.map((it,i)=>{
    const qty=parseFloat(it.qty)||1;
    const price=parseFloat(it.price)||0;
    const vatPct=parseFloat(it.vat)||0;
    const net=qty*price;
    const vat=net*vatPct/100;
    const gross=net+vat;
    const vatCode=vatPct===23?'23':vatPct===8?'8':vatPct===5?'5':vatPct===0?'0':'ZW';
    return `
    <fa:FaWiersz>
      <fa:NrWierszaFa>${i+1}</fa:NrWierszaFa>
      <fa:P_6A>${esc(it.description)}</fa:P_6A>
      <fa:P_7>${esc(it.description)}</fa:P_7>
      <fa:P_8A>szt.</fa:P_8A>
      <fa:P_8B>${qty.toFixed(4)}</fa:P_8B>
      <fa:P_9A>${price.toFixed(2)}</fa:P_9A>
      <fa:P_9B>${net.toFixed(2)}</fa:P_9B>
      <fa:P_10>${vatCode}</fa:P_10>
      <fa:P_11>${net.toFixed(2)}</fa:P_11>
      <fa:P_12>${vatCode}</fa:P_12>
    </fa:FaWiersz>`;
  }).join('');

  // VAT breakdown by rate
  const vatGroups={};
  items.forEach(it=>{
    const vatPct=parseFloat(it.vat)||0;
    const net=(parseFloat(it.qty)||1)*(parseFloat(it.price)||0);
    const vat=net*vatPct/100;
    const key=String(vatPct);
    if(!vatGroups[key])vatGroups[key]={net:0,vat:0,rate:vatPct};
    vatGroups[key].net+=net;vatGroups[key].vat+=vat;
  });
  const vatRows=Object.values(vatGroups).map(g=>`
    <fa:StawkiPodatku>
      <fa:P_12>${g.rate===23?'23':g.rate===8?'8':g.rate===5?'5':'0'}</fa:P_12>
      <fa:P_11>${g.net.toFixed(2)}</fa:P_11>
      <fa:P_14>${g.vat.toFixed(2)}</fa:P_14>
    </fa:StawkiPodatku>`).join('');

  const tNet=parseFloat(inv.total_net||0);
  const tVat=parseFloat(inv.total_vat||0);
  const tGross=parseFloat(inv.total_gross||0);

  const eurRow=isEUR&&rate>0?`
      <fa:KursWaluty>${rate.toFixed(4)}</fa:KursWaluty>
      <fa:DataKursuWaluty>${inv.eur_rate_date||issueDate}</fa:DataKursuWaluty>
      <fa:NazwaWaluty>${currency}</fa:NazwaWaluty>`:'';

  const corrRow=docType==='korekta'&&inv.corrects_number?`
    <fa:Korekta>
      <fa:NrFaKorygowanej>${esc(inv.corrects_number)}</fa:NrFaKorygowanej>
      <fa:OkresFaKorygowanej>${esc(inv.corrects_number)}</fa:OkresFaKorygowanej>
      <fa:PrzyczynaKorekty>${esc(inv.correction_reason||'Korekta')}</fa:PrzyczynaKorekty>
    </fa:Korekta>`:'';

  return `<?xml version="1.0" encoding="UTF-8"?>
<fa:Faktura xmlns:fa="http://crd.gov.pl/wzor/2023/06/29/12648/"
  xmlns:etd="http://crd.gov.pl/xml/schematy/dziedzinowe/mf/2022/01/05/eD/DefinicjeTypy/"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <fa:Naglowek>
    <fa:KodFormularza kodSystemowy="FA (2)" wersjaSchemy="1-0E">FA</fa:KodFormularza>
    <fa:WariantFormularza>2</fa:WariantFormularza>
    <fa:DataWytworzeniaFa>${ts}</fa:DataWytworzeniaFa>
    <fa:SystemInfo>TransportManager</fa:SystemInfo>
  </fa:Naglowek>
  <fa:Podmiot1>
    <fa:DaneIdentyfikacyjne>
      <fa:NIP>${esc((inv.seller_nip||'').replace(/[^0-9]/g,''))}</fa:NIP>
      <fa:PelnaNazwa>${esc(inv.seller_name)}</fa:PelnaNazwa>
    </fa:DaneIdentyfikacyjne>
    <fa:Adres>
      <fa:AdresL1>${esc(inv.seller_address)}</fa:AdresL1>
    </fa:Adres>
    <fa:NrKontaBankowego>${esc((inv.seller_bank||'').replace(/\s/g,''))}</fa:NrKontaBankowego>
  </fa:Podmiot1>
  <fa:Podmiot2>
    <fa:DaneIdentyfikacyjne>
      <fa:NIP>${esc((inv.buyer_nip||'').replace(/[^0-9]/g,''))}</fa:NIP>
      <fa:PelnaNazwa>${esc(inv.buyer_name)}</fa:PelnaNazwa>
    </fa:DaneIdentyfikacyjne>
    <fa:Adres>
      <fa:AdresL1>${esc(inv.buyer_address)}</fa:AdresL1>
