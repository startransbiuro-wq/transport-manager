const Settings=({db})=>{
  const [settings,setSettings]=db.settings;
  const [loc,setLoc]=useState({...settings});
  const [saved,setSaved]=useState(false);
  const [restoreMsg,setRestoreMsg]=useState(null);
  const save=()=>{setSettings(loc);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const F=(k,l,t='text',ph='')=>(<div><label style={C.lbl}>{l}</label><input style={C.inp} type={t} placeholder={ph} value={loc[k]||''} onChange={e=>setLoc(p=>({...p,[k]:e.target.value}))}/></div>);

  const BACKUP_KEYS=['tm_drivers','tm_vehicles','tm_repairs','tm_insurance','tm_orders','tm_invoices','tm_trips','tm_fines','tm_company','tm_contractors','tm_settings','tm_repair_types','tm_costs','tm_cost_categories','tm_todos','tm_payroll','tm_dismissed_alerts','tm_report_cols_orders','tm_report_cols_invoices'];

  const exportBackup=()=>{
    const data={version:1,exported:new Date().toISOString(),data:{}};
    BACKUP_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)data.data[k]=JSON.parse(v);});
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`TransportManager_backup_${today()}.json`;
    a.click();URL.revokeObjectURL(a.href);
  };

  const importBackup=e=>{
    const file=e.target.files[0];if(!file)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.data)throw new Error('Nieprawidłowy format pliku kopii zapasowej.');
        const keys=Object.keys(data.data);
        if(window.confirm(`Czy na pewno chcesz przywrócić kopię zapasową z ${data.exported?new Date(data.exported).toLocaleString('pl'):'nieznanej daty'}?\n\nZostaną przywrócone: ${keys.length} kolekcji danych.\n\nUWAGA: Bieżące dane zostaną nadpisane!`)){
          keys.forEach(k=>localStorage.setItem(k,JSON.stringify(data.data[k])));
          setRestoreMsg({ok:true,msg:`Przywrócono ${keys.length} kolekcji. Odśwież stronę żeby zobaczyć dane.`});
          setTimeout(()=>window.location.reload(),1500);
        }
      }catch(err){setRestoreMsg({ok:false,msg:`Błąd: ${err.message}`});}
    };
    rd.readAsText(file);
    e.target.value='';
  };

  return(<div>
    <h1 style={{fontSize:18,fontWeight:500,margin:'0 0 14px'}}>Ustawienia</h1>

    {/* BACKUP */}
    <div style={{...C.card,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10,display:'flex',alignItems:'center',gap:6}}><i className="ti ti-database-export" style={{color:'#185FA5'}}/>Kopia zapasowa danych</div>
      <div style={{fontSize:11,color:'#555',marginBottom:10}}>Eksportuj wszystkie dane aplikacji do pliku JSON. Importuj plik żeby przywrócić dane (np. po zmianie przeglądarki lub komputera). Plik zawiera wszystkich kierowców, pojazdy, zlecenia, faktury i pozostałe dane.</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <button style={C.btnP} onClick={exportBackup}><i className="ti ti-download"/> Pobierz kopię zapasową</button>
        <label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-upload"/> Przywróć z kopii<input type="file" accept=".json,application/json" onChange={importBackup} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/></label>
      </div>
      {restoreMsg&&<div style={{marginTop:8,padding:'7px 10px',borderRadius:7,background:restoreMsg.ok?'#EAF3DE':'#FCEBEB',color:restoreMsg.ok?'#3B6D11':'#A32D2D',fontSize:11}}>{restoreMsg.msg}</div>}
    </div>

    {/* KSEF */}
    <div style={{...C.card,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:12,display:'flex',alignItems:'center',gap:6}}><i className="ti ti-brand-mastercard" style={{color:'#185FA5'}}/>Integracja KSeF</div>
      <div style={C.g2}>
        <div><label style={C.lbl}>Środowisko KSeF</label>
          <select style={C.inp} value={loc.ksef_env||'test'} onChange={e=>setLoc(p=>({...p,ksef_env:e.target.value}))}>
            <option value="test">Testowe (ksef-demo.mf.gov.pl)</option>
            <option value="prod">Produkcyjne (ksef.mf.gov.pl)</option>
          </select>
          {loc.ksef_env==='prod'&&<div style={{fontSize:10,color:'#A32D2D',marginTop:3}}><i className="ti ti-alert-triangle"/> Środowisko produkcyjne — faktury trafią do urzędu skarbowego</div>}
        </div>
        {F('ksef_token','Token autoryzacyjny KSeF','password','Wklej token z portalu KSeF...')}
      </div>
      <div style={{marginTop:10,fontSize:10,color:'#888',borderTop:'0.5px solid rgba(0,0,0,0.08)',paddingTop:8}}>
        Token wygenerujesz na portalu <strong>ksef.mf.gov.pl</strong> (lub ksef-demo.mf.gov.pl dla środowiska testowego) → Logowanie → Zarządzanie tokenami. Token jest przechowywany lokalnie w przeglądarce (localStorage) i nie jest nigdzie wysyłany poza API MF.
      </div>
    </div>

    <div style={{display:'flex',gap:6,marginBottom:14}}>
      <button style={C.btnP} onClick={save}><i className="ti ti-device-floppy"/> Zapisz ustawienia</button>
      {saved&&<span style={{...bdg('green'),display:'flex',alignItems:'center',gap:4}}><i className="ti ti-circle-check"/> Zapisano</span>}
    </div>

    <div style={C.card}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Schemat SQL (informacyjnie)</div>
      <pre style={{fontSize:10,background:'#f5f4f0',borderRadius:7,padding:12,lineHeight:1.7,overflowX:'auto',whiteSpace:'pre-wrap'}}>{`CREATE TABLE drivers (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, first_name text, last_name text, pesel text, phone text, license_number text, license_expiry date, status text, documents jsonb);
CREATE TABLE vehicles (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, registration text UNIQUE, brand text, model text, year int, vin text, type text);
CREATE TABLE insurance (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, vehicle_reg text, type text, company text, policy_number text, start_date date, expiry_date date, cost numeric, polisa_img text);
CREATE TABLE repairs (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, vehicle_reg text, date date, repair_type text, workshop text, cost numeric, description text, status text, invoice_img text);
CREATE TABLE orders (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, number text, order_number text, client_name text, client_nip text, load_address text, unload_address text, load_date date, unload_date date, driver_name text, vehicle_reg text, kilometers numeric, rate numeric, rate_hotel numeric, rate_highway numeric, rate_parking numeric, currency text, extras jsonb, notes text);
CREATE TABLE invoices (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, number text, seller_name text, seller_nip text, buyer_name text, buyer_nip text, issue_date date, sale_date date, payment_days int, currency text, items jsonb, total_net numeric, total_vat numeric, total_gross numeric, eur_rate numeric, eur_rate_date text, status text, ksef_sent boolean, ksef_ref text);
CREATE TABLE trips (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, driver_name text, vehicle_reg text, start_date date, end_date date, status text, daily_rate numeric, mileage_start int, mileage_end int, equipItems jsonb, checkBefore jsonb, checkAfter jsonb, transfers jsonb, fuels jsonb, vehicle_pickup_date date, vehicle_return_date date, vehicle_note text);
CREATE TABLE fines (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, fine_number text, driver_name text, vehicle_reg text, offense_date date, date date, location text, country text, reason text, amount numeric, amount_currency text, points int, settled boolean, settled_date date);
CREATE TABLE contractors (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, name text, nip text, address text, phone text, email text, bank_account text, is_default boolean);`}</pre>
    </div>
  </div>);
};

// PLANNING
const Planning=({db})=>{
  const [trips,setTrips]=db.trips;
  const [drivers]=db.drivers;
  const [vehicles]=db.vehicles;
  const [orders]=db.orders;

  const [viewStart,setViewStart]=useState(()=>{const d=new Date(new Date().getFullYear(),0,1);return d.toISOString().split('T')[0];});
  const [viewDays,setViewDays]=useState(365);
  const [addModal,setAddModal]=useState(false);
  const [addForm,setAddForm]=useState({});
  const [editModal,setEditModal]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [planTrips,setPlanTrips]=useState(()=>{try{return JSON.parse(localStorage.getItem('tm_plan_trips')||'[]');}catch{return[];}});
  const [planEvents,setPlanEvents]=useState(()=>{try{return JSON.parse(localStorage.getItem('tm_plan_events')||'[]');}catch{return[];}});
  const [eventModal,setEventModal]=useState(false);
  const [eventForm,setEventForm]=useState({});

  // Drag state
  const [drag,setDrag]=useState(null); // {vehicleReg, startDay, currentDay}
  const [dragMode,setDragMode]=useState('trip'); // 'trip' | 'event'
  const dragRef=React.useRef(null);

  // Scroll to today on mount
  useEffect(()=>{
    if(!dragRef.current)return;
    const startOfYear=new Date(new Date().getFullYear(),0,1);
    const todayDate=new Date();
    const daysDiff=Math.floor((todayDate-startOfYear)/86400000);
    const COL=18; // mini COL_W
    const LABEL=90; // mini LABEL_W
    const scrollX=Math.max(0,LABEL+daysDiff*COL-dragRef.current.clientWidth/2);
    dragRef.current.scrollLeft=scrollX;
  },[]);

  const savePlanTrips=v=>{const arr=typeof v==='function'?v(planTrips):v;setPlanTrips(arr);localStorage.setItem('tm_plan_trips',JSON.stringify(arr));};
  const savePlanEvents=v=>{const arr=typeof v==='function'?v(planEvents):v;setPlanEvents(arr);localStorage.setItem('tm_plan_events',JSON.stringify(arr));};

  const dateArr=Array.from({length:viewDays},(_,i)=>{
    const d=new Date(viewStart);d.setDate(d.getDate()+i);
    return d.toISOString().split('T')[0];
  });
  const periodEnd=dateArr[dateArr.length-1];

  const isWeekend=d=>{const day=new Date(d).getDay();return day===0||day===6;};
  const isToday=d=>d===today();

  const [zoom,setZoom]=useState('mini');
  const COL_W=zoom==='mini'?18:zoom==='compact'?26:38;
  const LABEL_W=zoom==='mini'?90:zoom==='compact'?100:120;
  const ROW_H=zoom==='mini'?32:zoom==='compact'?38:48;

  const tripColor=t=>{
    if(t._plan)return'#b0b0b0';
    const s=t.status||'zaplanowany';
    if(s==='aktywny')return'#4BA3E3';
    if(s==='zakończony')return'#5A7A3A';
    return'#F0A840';
  };

  const nav=days=>setViewStart(()=>{const d=new Date(viewStart);d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];});
  const goToday=()=>{const d=new Date();d.setDate(d.getDate()-3);setViewStart(d.toISOString().split('T')[0]);};
  const goYear=()=>{const d=new Date(new Date().getFullYear(),0,1);setViewStart(d.toISOString().split('T')[0]);setViewDays(365);};

  const barProps=(start,end)=>{
    if(!start)return null;
    const clamp=(d,mn,mx)=>d<mn?mn:d>mx?mx:d;
    const s=clamp(start,viewStart,periodEnd);
    const e=clamp(end||periodEnd,viewStart,periodEnd);
    const si=dateArr.indexOf(s);const ei=dateArr.indexOf(e);
    if(si===-1&&ei===-1)return null;
    return{left:LABEL_W+Math.max(si,0)*COL_W+2,width:Math.max((Math.min(ei>=0?ei:dateArr.length-1)-(Math.max(si,0))+1)*COL_W-4,COL_W/2),cutLeft:si<0,cutRight:ei<0};
  };

  // Get date from x position in grid
  const xToDay=(x,gridLeft)=>{
    const col=Math.floor((x-gridLeft-LABEL_W)/COL_W);
    if(col<0||col>=dateArr.length)return null;
    return dateArr[col];
  };

  // Sort two days
  const sortDays=(a,b)=>a<=b?[a,b]:[b,a];

  const saveTrip=()=>{
    if(addForm._plan){
      savePlanTrips(p=>[...p,{...addForm,id:gid(),created_at:today()}]);
    }else{
      setTrips(p=>[...p,{...addForm,id:gid(),created_at:today(),
        status:addForm.status||'zaplanowany',
        equipItems:DEFAULT_EQUIP.map(l=>({id:gid(),label:l})),
        checkBefore:{},checkAfter:{},transfers:[],fuels:[],photos:[]}]);
    }
    setAddModal(false);setAddForm({});
  };

  const [editTab,setEditTab]=useState('dane'); // 'dane' | 'checklist'
  const [editNewEL,setEditNewEL]=useState('');

  const updateTrip=()=>{
    if(editForm._plan)savePlanTrips(p=>p.map(t=>t.id===editForm.id?{...editForm}:t));
    else setTrips(p=>p.map(t=>t.id===editForm.id?{...t,...editForm}:t));
    setEditModal(false);
  };

  const deleteTrip=()=>{
    if(editForm._plan)savePlanTrips(p=>p.filter(t=>t.id!==editForm.id));
    else setTrips(p=>p.filter(t=>t.id!==editForm.id));
    setEditModal(false);
  };

  const months=['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'];
  const monthGroups=[];let curM=null;
  dateArr.forEach((d,i)=>{
    const m=d.slice(0,7);
    if(!curM||curM.month!==m){curM={month:m,label:`${months[parseInt(d.slice(5,7))-1]} ${d.slice(0,4)}`,count:1};monthGroups.push(curM);}
    else curM.count++;
  });

  const TripForm=({form,setForm,isPlan})=>(<div style={C.g2}>
    <div><label style={C.lbl}>Pojazd</label><select style={C.inp} value={form.vehicle_reg||''} onChange={e=>setForm(p=>({...p,vehicle_reg:e.target.value}))}>
      <option value="">Wybierz...</option>
      {vehicles.map(v=><option key={v.id} value={v.registration}>{v.registration} — {v.brand} {v.model}</option>)}
    </select></div>
    <div><label style={C.lbl}>Kierowca</label><select style={C.inp} value={form.driver_name||''} onChange={e=>setForm(p=>({...p,driver_name:e.target.value}))}>
      <option value="">Wybierz...</option>
      {drivers.map(d=>{const n=`${d.first_name} ${d.last_name}`;return<option key={d.id} value={n}>{n}</option>;})}
    </select></div>
    <div><label style={C.lbl}>Data rozpoczęcia</label><input style={C.inp} type="date" value={form.start_date||''} onChange={e=>setForm(p=>({...p,start_date:e.target.value}))}/></div>
    <div><label style={C.lbl}>Data zakończenia</label><input style={C.inp} type="date" value={form.end_date||''} onChange={e=>setForm(p=>({...p,end_date:e.target.value}))}/></div>
    <div><label style={C.lbl}>Trasa / opis</label><input style={C.inp} value={form.route||''} onChange={e=>setForm(p=>({...p,route:e.target.value}))} placeholder="np. Polska → Niemcy"/></div>
    {!isPlan&&<div><label style={C.lbl}>Status</label><select style={C.inp} value={form.status||'zaplanowany'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
      <option value="zaplanowany">Zaplanowany</option><option value="aktywny">Aktywny</option><option value="zakończony">Zakończony</option>
    </select></div>}
    {!isPlan&&<div><label style={C.lbl}>Stawka dzienna (PLN)</label><input style={C.inp} type="number" step="0.01" value={form.daily_rate||''} onChange={e=>setForm(p=>({...p,daily_rate:e.target.value}))}/></div>}
    <div style={{gridColumn:'span 2'}}><label style={C.lbl}>Notatka</label><input style={C.inp} value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Opcjonalnie..."/></div>
  </div>);

  // Drag selection preview
  const dragPreview=drag&&drag.currentDay?sortDays(drag.startDay,drag.currentDay):null;

  const allPlanTrips=[...trips,...planTrips];

  return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    {/* Toolbar */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8,flexShrink:0}}>
      <h1 style={{fontSize:18,fontWeight:500,margin:0}}>Planowanie wyjazdów</h1>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <button style={C.btn} onClick={()=>nav(-7)}><i className="ti ti-chevrons-left"/></button>
        <button style={C.btn} onClick={()=>nav(-1)}><i className="ti ti-chevron-left"/></button>
        <button style={C.btn} onClick={goToday}><i className="ti ti-calendar-today"/> Dziś</button>
        <button style={C.btn} onClick={()=>nav(1)}><i className="ti ti-chevron-right"/></button>
        <button style={C.btn} onClick={()=>nav(7)}><i className="ti ti-chevrons-right"/></button>
        <select style={{...C.inp,width:90}} value={viewDays} onChange={e=>setViewDays(parseInt(e.target.value))}>
          {[7,14,30,90,180,365].map(n=><option key={n} value={n}>{n} dni</option>)}
        </select>
        <button style={C.btn} onClick={goYear}><i className="ti ti-calendar"/> Rok</button>
        <div style={{display:'flex',border:'0.5px solid rgba(0,0,0,0.2)',borderRadius:7,overflow:'hidden'}}>
          {[['normal','Normalny','ti-layout-rows'],['compact','Kompakt','ti-layout-list'],['mini','Mini','ti-dots']].map(([z,l,ic])=>(
            <button key={z} onClick={()=>setZoom(z)} title={l} style={{
              background:zoom===z?'#1a1a18':'transparent',
              border:'none',padding:'5px 8px',cursor:'pointer',
              color:zoom===z?'#fff':'#888',fontSize:12,
              display:'flex',alignItems:'center',gap:3,
            }}><i className={`ti ${ic}`}/><span style={{fontSize:10}}>{l}</span></button>
          ))}
        </div>
        <button style={{...C.btn,color:'#888'}} onClick={()=>{setAddForm({start_date:today(),_plan:true});setAddModal(true)}}><i className="ti ti-pencil"/> Roboczy</button>
        <div style={{display:'flex',border:'0.5px solid rgba(0,0,0,0.2)',borderRadius:7,overflow:'hidden'}} title="Tryb przeciągania">
          <button onClick={()=>setDragMode('trip')} style={{background:dragMode==='trip'?'#F0A840':'transparent',border:'none',padding:'5px 9px',cursor:'pointer',color:dragMode==='trip'?'#fff':'#888',fontSize:11,display:'flex',alignItems:'center',gap:3}}><i className="ti ti-truck"/> Wyjazd</button>
          <button onClick={()=>setDragMode('event')} style={{background:dragMode==='event'?'#C0392B':'transparent',border:'none',padding:'5px 9px',cursor:'pointer',color:dragMode==='event'?'#fff':'#888',fontSize:11,display:'flex',alignItems:'center',gap:3}}><i className="ti ti-calendar-event"/> Wydarzenie</button>
        </div>
      </div>
    </div>

    {/* Legend */}
    <div style={{display:'flex',gap:12,marginBottom:6,fontSize:11,flexShrink:0,flexWrap:'wrap',alignItems:'center'}}>
      {[['#F0A840','Zaplanowany'],['#4BA3E3','Aktywny'],['#5A7A3A','Zakończony'],['#b0b0b0','Roboczy'],['#EF9F27','Zlecenie'],['#C0392B','Wydarzenie']].map(([c,l])=>
        <div key={l} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:18,height:9,borderRadius:2,background:c}}/><span style={{color:'#666'}}>{l}</span></div>
      )}
      <span style={{color:'#aaa',fontSize:10,marginLeft:8}}><i className="ti ti-drag-drop" style={{marginRight:3}}/>Przeciągnij na wierszu pojazdu aby dodać wyjazd</span>
    </div>

    {/* Gantt */}
    <div ref={dragRef} style={{flex:1,overflowX:'auto',overflowY:'auto',border:'0.5px solid rgba(0,0,0,0.1)',borderRadius:10,background:'#fff',position:'relative',userSelect:'none'}}
      onMouseLeave={()=>{if(drag)setDrag(null);}}>
      <div style={{minWidth:LABEL_W+dateArr.length*COL_W,position:'relative'}}>

        {/* Month header */}
        <div style={{display:'flex',position:'sticky',top:0,zIndex:21,background:'#1a1a18'}}>
          <div style={{width:LABEL_W,flexShrink:0,position:'sticky',left:0,zIndex:22,background:'#1a1a18',padding:'5px 10px'}}/>
          {monthGroups.map(g=><div key={g.month} style={{width:g.count*COL_W,flexShrink:0,padding:'5px 8px',fontSize:11,fontWeight:600,color:'#fff',borderLeft:'1px solid rgba(255,255,255,0.1)'}}>{g.label}</div>)}
        </div>

        {/* Day header */}
        <div style={{display:'flex',position:'sticky',top:28,zIndex:20,background:'#fff',borderBottom:'1.5px solid rgba(0,0,0,0.12)'}}>
          <div style={{width:LABEL_W,flexShrink:0,padding:'4px 10px',fontSize:10,color:'#888',background:'#fff',borderRight:'0.5px solid rgba(0,0,0,0.08)',position:'sticky',left:0,zIndex:21}}>Pojazd</div>
          {dateArr.map(d=><div key={d} style={{width:COL_W,flexShrink:0,textAlign:'center',padding:'3px 0',background:isToday(d)?'#1a1a18':isWeekend(d)?'#f5f4f0':'#fff',borderLeft:'0.5px solid rgba(0,0,0,0.06)'}}>
            {zoom!=='mini'&&<div style={{fontSize:7,color:isToday(d)?'rgba(255,255,255,0.7)':isWeekend(d)?'#854F0B':'#aaa'}}>
              {['Nd','Pn','Wt','Śr','Cz','Pt','So'][new Date(d).getDay()]}
            </div>}
            <div style={{fontSize:zoom==='mini'?9:11,fontWeight:isToday(d)?700:500,color:isToday(d)?'#fff':'#1a1a18',lineHeight:zoom==='mini'?'20px':'normal'}}>{d.slice(8)}</div>
          </div>)}
        </div>

        {/* Global events row — events without specific vehicle */}
        {planEvents.filter(e=>!e.vehicle_reg&&e.start_date<=periodEnd&&(!e.end_date||e.end_date>=viewStart)).length>0&&(
          <div style={{display:'flex',position:'relative',borderBottom:'1px solid rgba(192,57,43,0.2)',minHeight:ROW_H*0.8,background:'#FEF9F9'}}>
            <div style={{width:LABEL_W,flexShrink:0,padding:'5px 10px',position:'sticky',left:0,zIndex:10,background:'#FEF9F9',borderRight:'0.5px solid rgba(0,0,0,0.08)',display:'flex',alignItems:'center'}}>
              <span style={{fontSize:9,fontWeight:600,color:'#C0392B',textTransform:'uppercase',letterSpacing:'0.04em'}}>Ogólne</span>
            </div>
            {dateArr.map(d=><div key={d} style={{width:COL_W,flexShrink:0,background:isToday(d)?'rgba(192,57,43,0.07)':isWeekend(d)?'rgba(239,159,39,0.03)':'transparent',borderLeft:'0.5px solid rgba(0,0,0,0.04)'}}/>)}
            {planEvents.filter(e=>!e.vehicle_reg&&e.start_date<=periodEnd&&(!e.end_date||e.end_date>=viewStart)).map((ev,ei)=>{
              const bp=barProps(ev.start_date,ev.end_date||ev.start_date);if(!bp)return null;
              const days=ev.end_date&&ev.end_date!==ev.start_date?Math.round((new Date(ev.end_date)-new Date(ev.start_date))/86400000)+1:1;
              return<div key={ev.id} data-trip="1"
                onClick={e=>{e.stopPropagation();setEventForm({...ev});setEventModal(true);}}
                title={`${ev.title||'Wydarzenie'}${ev.notes?'\n'+ev.notes:''}`}
                style={{position:'absolute',left:bp.left,width:bp.width,top:4+ei*20,height:16,
                  background:'#C0392B',borderRadius:3,display:'flex',alignItems:'center',paddingLeft:5,overflow:'hidden',cursor:'pointer',zIndex:6,boxShadow:'0 1px 2px rgba(192,57,43,0.3)',
                }}>
                {zoom!=='mini'&&<span style={{fontSize:9,color:'#fff',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>⚠ {ev.title||'Wydarzenie'}{days>1?` (${days}d)`:''}</span>}
              </div>;
            })}
          </div>
        )}

        {/* Vehicle rows */}
        {vehicles.map((v,vi)=>{
          const vTrips=allPlanTrips.filter(t=>t.vehicle_reg===v.registration&&t.start_date&&t.start_date<=periodEnd&&(!t.end_date||t.end_date>=viewStart));
          const vOrders=orders.filter(o=>o.vehicle_reg===v.registration&&o.load_date&&o.load_date<=periodEnd&&(!o.unload_date||o.unload_date>=viewStart));
          const rowH=Math.max(ROW_H,vTrips.length>0&&vOrders.length>0?74:ROW_H);
          const isDraggingThis=drag&&drag.vehicleReg===v.registration;

          return(<div key={v.id} style={{display:'flex',position:'relative',borderBottom:'0.5px solid rgba(0,0,0,0.07)',minHeight:rowH,background:vi%2===0?'#fff':'#fafaf9'}}
            onMouseDown={e=>{
              if(e.target.closest('[data-trip]'))return; // clicking on existing trip
              const rect=dragRef.current.getBoundingClientRect();
              const scrollLeft=dragRef.current.scrollLeft;
              const day=xToDay(e.clientX-rect.left+scrollLeft,0);
              if(day)setDrag({vehicleReg:v.registration,startDay:day,currentDay:day,mode:dragMode});
            }}
            onMouseMove={e=>{
              if(!drag||drag.vehicleReg!==v.registration)return;
              const rect=dragRef.current.getBoundingClientRect();
              const scrollLeft=dragRef.current.scrollLeft;
              const day=xToDay(e.clientX-rect.left+scrollLeft,0);
              if(day&&day!==drag.currentDay)setDrag(p=>({...p,currentDay:day}));
            }}
            onMouseUp={e=>{
              if(!drag||drag.vehicleReg!==v.registration)return;
              const [s,en]=sortDays(drag.startDay,drag.currentDay);
              setDrag(null);
              if(drag.mode==='event'){
                setEventForm({vehicle_reg:v.registration,start_date:s,end_date:en});
                setEventModal(true);
              }else{
                setAddForm({vehicle_reg:v.registration,start_date:s,end_date:en,status:'zaplanowany'});
                setAddModal(true);
              }
            }}>

            {/* Label */}
            <div style={{width:LABEL_W,flexShrink:0,padding:zoom==='mini'?'4px 8px':'8px 10px',position:'sticky',left:0,zIndex:10,background:vi%2===0?'#fff':'#fafaf9',borderRight:'0.5px solid rgba(0,0,0,0.08)',display:'flex',flexDirection:'column',justifyContent:'center'}}>
              <div style={{fontSize:zoom==='mini'?10:12,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{v.registration}</div>
              {zoom!=='mini'&&<div style={{fontSize:9,color:'#888'}}>{v.brand} {v.model}</div>}
            </div>

            {/* Day bg columns */}
            {dateArr.map(d=><div key={d} style={{width:COL_W,flexShrink:0,
              background:isToday(d)?'rgba(26,26,24,0.05)':isWeekend(d)?'rgba(239,159,39,0.04)':'transparent',
              borderLeft:'0.5px solid rgba(0,0,0,0.04)',
              cursor:isDraggingThis?'col-resize':'crosshair',
            }}/>)}

            {/* Drag preview */}
            {isDraggingThis&&dragPreview&&(()=>{
              const bp=barProps(dragPreview[0],dragPreview[1]);
              if(!bp)return null;
              const isEv=drag.mode==='event';
              return<div style={{position:'absolute',left:bp.left,width:bp.width,top:6,height:rowH-14,
                background:isEv?'rgba(192,57,43,0.15)':'rgba(26,26,24,0.15)',
                borderRadius:6,border:`2px dashed ${isEv?'#C0392B':'#1a1a18'}`,
                pointerEvents:'none',zIndex:8,display:'flex',alignItems:'center',justifyContent:'center',
              }}>
                <span style={{fontSize:10,fontWeight:600,color:isEv?'#C0392B':'#1a1a18'}}>{dragPreview[0]===dragPreview[1]?dragPreview[0]:`${dragPreview[0]} → ${dragPreview[1]}`}</span>
              </div>;
            })()}

            {/* Trip bars */}
            {vTrips.map(t=>{
              const bp=barProps(t.start_date,t.end_date);if(!bp)return null;
              const col=tripColor(t);
              const tripH=zoom==='mini'?14:zoom==='compact'?18:24;
              const tripTop=zoom==='mini'?3:zoom==='compact'?4:6;
              const orderH=zoom==='mini'?10:zoom==='compact'?13:18;
              return<div key={t.id} data-trip="1"
                onClick={e=>{e.stopPropagation();setEditForm({...t});setEditModal(true);}}
                title={`${t.driver_name||'Wyjazd'} · ${t.start_date}→${t.end_date||'?'}${t._plan?' [Roboczy]':''}`}
                style={{position:'absolute',left:bp.left,width:bp.width,top:tripTop,height:tripH,
                  background:col,borderRadius:`${bp.cutLeft?0:4}px ${bp.cutRight?0:4}px ${bp.cutRight?0:4}px ${bp.cutLeft?0:4}px`,
                  display:'flex',alignItems:'center',paddingLeft:zoom==='mini'?3:5,overflow:'hidden',
                  cursor:'pointer',zIndex:5,boxShadow:'0 1px 3px rgba(0,0,0,0.12)',
                  border:t._plan?'1.5px dashed rgba(0,0,0,0.2)':'none',opacity:t._plan?0.8:1,
                }}>
                {zoom!=='mini'&&<span style={{fontSize:zoom==='compact'?9:10,color:'#fff',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',textShadow:'0 1px 2px rgba(0,0,0,0.3)'}}>
                  {t._plan?'✏ ':''}{t.driver_name||'Wyjazd'}
                  {t.start_date&&t.end_date&&<span style={{opacity:0.75,marginLeft:4}}>({Math.round((new Date(t.end_date)-new Date(t.start_date))/86400000)+1}d)</span>}
                </span>}
              </div>;
            })}

            {/* Order bars */}
            {vOrders.map(o=>{
              const bp=barProps(o.load_date,o.unload_date);if(!bp)return null;
              return<div key={o.id} data-trip="1"
                title={`Zlecenie: ${o.order_number||o.number}`}
                style={{position:'absolute',left:bp.left,width:bp.width,
                  top:vTrips.length>0?(zoom==='mini'?18:zoom==='compact'?24:34):tripTop,
                  height:orderH,
                  background:'#EF9F27',borderRadius:3,display:'flex',alignItems:'center',paddingLeft:4,overflow:'hidden',cursor:'pointer',zIndex:4,opacity:0.9,
                }}>
                {zoom!=='mini'&&<span style={{fontSize:9,color:'#fff',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{o.order_number||o.number}</span>}
              </div>;
            })}

            {/* Event bars — red, below orders/trips */}
            {planEvents.filter(e=>e.vehicle_reg===v.registration&&e.start_date<=periodEnd&&(!e.end_date||e.end_date>=viewStart)).map((ev,ei)=>{
              const bp=barProps(ev.start_date,ev.end_date||ev.start_date);if(!bp)return null;
              const evTop=rowH-(zoom==='mini'?14:18)*(ei+1);
              const evH=zoom==='mini'?10:14;
              const days=ev.end_date&&ev.end_date!==ev.start_date?Math.round((new Date(ev.end_date)-new Date(ev.start_date))/86400000)+1:1;
              return<div key={ev.id} data-trip="1"
                onClick={e=>{e.stopPropagation();setEventForm({...ev});setEventModal(true);}}
                title={`${ev.title||'Wydarzenie'} · ${ev.start_date}→${ev.end_date||ev.start_date}${ev.notes?'\n'+ev.notes:''}`}
                style={{position:'absolute',left:bp.left,width:bp.width,top:evTop,height:evH,
                  background:'#C0392B',
                  borderRadius:`${bp.cutLeft?0:3}px ${bp.cutRight?0:3}px ${bp.cutRight?0:3}px ${bp.cutLeft?0:3}px`,
                  display:'flex',alignItems:'center',paddingLeft:4,overflow:'hidden',
                  cursor:'pointer',zIndex:7,boxShadow:'0 1px 3px rgba(192,57,43,0.35)',
                }}>
                {zoom!=='mini'&&<span style={{fontSize:8,color:'#fff',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  ⚠ {ev.title||'Wydarzenie'}{days>1?` (${days}d)`:''}</span>}
              </div>;
            })}
          </div>);
        })}

        {vehicles.length===0&&<div style={{padding:60,textAlign:'center',color:'#888',fontSize:13}}>
          <i className="ti ti-truck" style={{fontSize:40,display:'block',marginBottom:10,opacity:0.2}}/>Brak pojazdów. Dodaj pojazdy w module Pojazdy.
        </div>}
      </div>
    </div>
    <div style={{marginTop:6,fontSize:10,color:'#aaa',flexShrink:0}}>{viewStart} → {periodEnd} · {viewDays} dni · {vehicles.length} pojazdów</div>

    {/* Event modal */}
    {eventModal&&<Modal title={eventForm.id?'Edytuj wydarzenie':'Nowe wydarzenie'} onClose={()=>setEventModal(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div><label style={C.lbl}>Nazwa wydarzenia</label><input style={C.inp} value={eventForm.title||''} onChange={e=>setEventForm(p=>({...p,title:e.target.value}))} placeholder="np. Kontrola ITD, Przegląd floty, Urlop..." autoFocus/></div>
        <div><label style={C.lbl}>Pojazd (opcjonalnie)</label><select style={C.inp} value={eventForm.vehicle_reg||''} onChange={e=>setEventForm(p=>({...p,vehicle_reg:e.target.value}))}>
          <option value="">— Ogólne (wszystkie pojazdy) —</option>
          {vehicles.map(v=><option key={v.id} value={v.registration}>{v.registration} — {v.brand} {v.model}</option>)}
        </select></div>
        <div style={C.g2}>
          <div><label style={C.lbl}>Data od</label><input style={C.inp} type="date" value={eventForm.start_date||''} onChange={e=>setEventForm(p=>({...p,start_date:e.target.value}))}/></div>
          <div><label style={C.lbl}>Data do</label><input style={C.inp} type="date" value={eventForm.end_date||''} onChange={e=>setEventForm(p=>({...p,end_date:e.target.value}))}/></div>
        </div>
        <div><label style={C.lbl}>Notatka</label><input style={C.inp} value={eventForm.notes||''} onChange={e=>setEventForm(p=>({...p,notes:e.target.value}))} placeholder="Opcjonalnie..."/></div>
      </div>
      <div style={{display:'flex',gap:6,justifyContent:'space-between',marginTop:12,position:'sticky',bottom:0,background:'#fff',paddingTop:10,paddingBottom:6,borderTop:'0.5px solid rgba(0,0,0,0.08)'}}>
        {eventForm.id?<button style={{...C.btn,color:'#A32D2D'}} onClick={()=>{savePlanEvents(p=>p.filter(e=>e.id!==eventForm.id));setEventModal(false);}}><i className="ti ti-trash"/> Usuń</button>:<div/>}
        <div style={{display:'flex',gap:6}}>
          <button style={C.btn} onClick={()=>setEventModal(false)}>Anuluj</button>
          <button style={{...C.btnP,background:'#C0392B'}} onClick={()=>{
            if(!eventForm.title?.trim()&&!eventForm.start_date)return;
            if(eventForm.id)savePlanEvents(p=>p.map(e=>e.id===eventForm.id?{...eventForm}:e));
            else savePlanEvents(p=>[...p,{...eventForm,id:gid(),end_date:eventForm.end_date||eventForm.start_date}]);
            setEventModal(false);
          }}><i className="ti ti-check"/> {eventForm.id?'Zapisz':'Dodaj wydarzenie'}</button>
        </div>
      </div>
    </Modal>}

    {/* Add modal */}
    {addModal&&<Modal title={addForm._plan?'✏ Nowy wyjazd roboczy':'Nowy wyjazd'} onClose={()=>setAddModal(false)}>
      {addForm._plan&&<div style={{marginBottom:10,padding:'7px 10px',background:'#f5f4f0',borderRadius:7,fontSize:11,color:'#666'}}><i className="ti ti-pencil" style={{marginRight:5}}/>Wyjazd roboczy — tylko planowanie, nie pojawi się w module Wyjazdy.</div>}
      <TripForm form={addForm} setForm={setAddForm} isPlan={addForm._plan}/>
      <div style={{display:'flex',gap:6,alignItems:'center',justifyContent:'space-between',marginTop:12,position:'sticky',bottom:0,background:'#fff',paddingTop:10,paddingBottom:6,borderTop:'0.5px solid rgba(0,0,0,0.08)'}}>
        <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
          <input type="checkbox" checked={!!addForm._plan} onChange={e=>setAddForm(p=>({...p,_plan:e.target.checked}))} style={{width:13,height:13}}/>
          Tylko roboczy (nie zapisuj do Wyjazdów)
        </label>
        <div style={{display:'flex',gap:6}}>
          <button style={C.btn} onClick={()=>setAddModal(false)}>Anuluj</button>
          <button style={C.btnP} onClick={saveTrip} disabled={!addForm.vehicle_reg||!addForm.start_date}><i className="ti ti-check"/> Dodaj</button>
        </div>
      </div>
    </Modal>}

    {/* Edit modal */}
    {editModal&&<Modal title={editForm._plan?'✏ Edycja wyjazdu roboczego':'Edycja wyjazdu'} onClose={()=>{setEditModal(false);setEditTab('dane');}} wide>
      {editForm._plan&&<div style={{marginBottom:10,padding:'8px 10px',background:'#f5f4f0',borderRadius:7,fontSize:11,color:'#666',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
        <span><i className="ti ti-pencil" style={{marginRight:5}}/>Wyjazd roboczy — nie pojawia się w module Wyjazdy.</span>
        <div style={{display:'flex',gap:5}}>
          {['zaplanowany','aktywny'].map(s=>(
            <button key={s} style={{...C.btnP,background:s==='aktywny'?'#4BA3E3':'#F0A840',fontSize:10,padding:'3px 9px'}}
              onClick={()=>{
                const {_plan,...rest}=editForm;
                const newTrip={...rest,status:s,id:gid(),created_at:today(),
                  equipItems:rest.equipItems||DEFAULT_EQUIP.map(l=>({id:gid(),label:l})),
                  checkBefore:rest.checkBefore||{},checkAfter:rest.checkAfter||{},
                  transfers:rest.transfers||[],fuels:rest.fuels||[],photos:rest.photos||[]};
                setTrips(p=>[...p,newTrip]);
                savePlanTrips(p=>p.filter(t=>t.id!==editForm.id));
                setEditModal(false);
              }}>
              <i className={`ti ${s==='aktywny'?'ti-truck':'ti-calendar-check'}`}/> Zmień na {s}
            </button>
          ))}
        </div>
      </div>}

      {/* Tabs */}
      <div style={{display:'flex',gap:2,borderBottom:'0.5px solid rgba(0,0,0,0.1)',marginBottom:12}}>
        {[{id:'dane',label:'Dane wyjazdu',icon:'ti-info-circle'},{id:'checklist',label:'Checklista',icon:'ti-checklist'}].map(tab=>(
          <button key={tab.id} onClick={()=>setEditTab(tab.id)} style={{
            background:'transparent',border:'none',
            borderBottom:editTab===tab.id?'2px solid #1a1a18':'2px solid transparent',
            padding:'6px 12px',fontSize:12,fontWeight:editTab===tab.id?500:400,
            color:editTab===tab.id?'#1a1a18':'#888',cursor:'pointer',
            display:'inline-flex',alignItems:'center',gap:4,marginBottom:-1,
          }}><i className={`ti ${tab.icon}`}/>{tab.label}</button>
        ))}
      </div>

      {editTab==='dane'&&<TripForm form={editForm} setForm={setEditForm} isPlan={editForm._plan}/>}

      {editTab==='checklist'&&<div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <input style={{...C.inp,flex:1}} placeholder="Dodaj pozycję checklisty..." value={editNewEL} onChange={e=>setEditNewEL(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&editNewEL.trim()){const id=gid();setEditForm(p=>({...p,equipItems:[...(p.equipItems||[]),{id,label:editNewEL.trim()}]}));setEditNewEL('');}}}/>
          <button style={C.btnP} onClick={()=>{if(!editNewEL.trim())return;const id=gid();setEditForm(p=>({...p,equipItems:[...(p.equipItems||[]),{id,label:editNewEL.trim()}]}));setEditNewEL('');}}><i className="ti ti-plus"/></button>
        </div>
        {(editForm.equipItems||[]).length>0
          ?<div style={{display:'flex',flexDirection:'column',gap:6}}>
            {(editForm.equipItems||[]).map(item=>(
              <div key={item.id} style={{background:'#f5f4f0',borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                <div style={{flex:1,fontSize:12}}>{item.label}</div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <button onClick={()=>setEditForm(p=>({...p,checkBefore:{...(p.checkBefore||{}),[item.id]:!(p.checkBefore||{})[item.id]}}))}
                    style={{width:36,height:36,borderRadius:8,background:(editForm.checkBefore||{})[item.id]?'#185FA5':'#fff',border:`2px solid ${(editForm.checkBefore||{})[item.id]?'#185FA5':'#ccc'}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                    {(editForm.checkBefore||{})[item.id]
                      ?<i className="ti ti-check" style={{color:'#fff',fontSize:16}}/>
                      :<span style={{fontSize:8,color:'#888',fontWeight:600}}>PRZED</span>}
                  </button>
                  <button onClick={()=>setEditForm(p=>({...p,checkAfter:{...(p.checkAfter||{}),[item.id]:!(p.checkAfter||{})[item.id]}}))}
                    style={{width:36,height:36,borderRadius:8,background:(editForm.checkAfter||{})[item.id]?'#3B6D11':'#fff',border:`2px solid ${(editForm.checkAfter||{})[item.id]?'#3B6D11':'#ccc'}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                    {(editForm.checkAfter||{})[item.id]
                      ?<i className="ti ti-check" style={{color:'#fff',fontSize:16}}/>
                      :<span style={{fontSize:8,color:'#888',fontWeight:600}}>PO</span>}
                  </button>
                  <button style={{...C.btn,padding:'4px 6px'}} onClick={()=>setEditForm(p=>({...p,
                    equipItems:(p.equipItems||[]).filter(x=>x.id!==item.id),
                    checkBefore:Object.fromEntries(Object.entries(p.checkBefore||{}).filter(([k])=>k!==item.id)),
                    checkAfter:Object.fromEntries(Object.entries(p.checkAfter||{}).filter(([k])=>k!==item.id)),
                  }))}><i className="ti ti-trash" style={{fontSize:11}}/></button>
                </div>
              </div>
            ))}
          </div>
          :<div style={{textAlign:'center',padding:20,color:'#aaa',fontSize:11}}>Brak pozycji checklisty. Dodaj je powyżej lub w module Wyjazdy.</div>
        }

// ─── AUTH HELPERS ─────────────────────────────────────────────────────────────
const sbSignIn=async(email,password)=>{
  const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
    method:'POST',headers:{...SB_HEADERS,'Content-Type':'application/json'},
    body:JSON.stringify({email,password}),
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.error_description||d.message||'Błąd logowania');
  return d; // {access_token, user, ...}
};

const sbSignOut=async(token)=>{
  await fetch(`${SB_URL}/auth/v1/logout`,{
    method:'POST',headers:{...SB_HEADERS,'Authorization':`Bearer ${token}`},
  }).catch(()=>{});
};

const sbGetProfile=async(userId,token)=>{
  const r=await fetch(`${SB_URL}/rest/v1/user_profiles?id=eq.${userId}&select=*`,{
    headers:{...SB_HEADERS,'Authorization':`Bearer ${token}`},
  });
  if(!r.ok)return null;
  const rows=await r.json();
  return rows?.[0]||null;
};

const sbCreateUser=async(email,password,adminToken)=>{
  const r=await fetch(`${SB_URL}/auth/v1/admin/users`,{
    method:'POST',
    headers:{...SB_HEADERS,'Authorization':`Bearer ${adminToken}`,'Content-Type':'application/json'},
    body:JSON.stringify({email,password,email_confirm:true}),
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.message||'Błąd tworzenia użytkownika');
  return d;
};

const sbGetAllProfiles=async(token)=>{
  const r=await fetch(`${SB_URL}/rest/v1/user_profiles?select=*&order=created_at.asc`,{
    headers:{...SB_HEADERS,'Authorization':`Bearer ${token}`},
  });
  if(!r.ok)return[];
  return await r.json();
};

const sbUpdateProfile=async(userId,data,token)=>{
  await fetch(`${SB_URL}/rest/v1/user_profiles?id=eq.${userId}`,{
    method:'PATCH',
    headers:{...SB_HEADERS,'Authorization':`Bearer ${token}`,'Prefer':'return=minimal'},
    body:JSON.stringify(data),
  });
};

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
const LoginScreen=({onLogin})=>{
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  const login=async()=>{
    if(!email||!password){setError('Wypełnij email i hasło.');return;}
    setLoading(true);setError('');
    try{
      const session=await sbSignIn(email,password);
      // Login immediately without waiting for profile
      onLogin({session,profile:null});
      // Profile will be fetched in App via useEffect
    }catch(e){setError(e.message);setLoading(false);}
  };

  return(<div style={{minHeight:'100vh',background:'#f5f4f0',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{background:'#fff',borderRadius:16,padding:32,width:360,boxShadow:'0 4px 32px rgba(0,0,0,0.08)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <div style={{width:36,height:36,background:'#1a1a18',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ti ti-truck" style={{color:'#fff',fontSize:18}}/></div>
        <div><div style={{fontSize:16,fontWeight:600}}>TransportManager</div><div style={{fontSize:11,color:'#888'}}>Zaloguj się aby kontynuować</div></div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div><label style={C.lbl}>Email</label><input style={C.inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&document.getElementById('pw-input')?.focus()} placeholder="twoj@email.com" autoFocus/></div>
        <div><label style={C.lbl}>Hasło</label><input id="pw-input" style={C.inp} type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="••••••••"/></div>
        {error&&<div style={{fontSize:11,color:'#A32D2D',padding:'6px 10px',background:'#FCEBEB',borderRadius:7}}>{error}</div>}
        <button style={{...C.btnP,width:'100%',padding:'10px',justifyContent:'center',marginTop:4}} onClick={login} disabled={loading}>
          {loading?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Logowanie...</>:<><i className="ti ti-login"/> Zaloguj się</>}
        </button>
      </div>
    </div>
  </div>);
};

const ALL_MODULES=[
  {id:'dashboard',label:'Panel główny'},{id:'company',label:'Dane firmy'},
  {id:'contractors',label:'Kontrahenci'},{id:'kadry',label:'Kadry'},
  {id:'vehicles',label:'Pojazdy'},{id:'repairs',label:'Naprawy'},
  {id:'orders',label:'Zlecenia'},{id:'invoices',label:'Faktury'},

  {id:'fines',label:'Mandaty'},{id:'settings',label:'Ustawienia'},
];

const UserManagement=({currentUser})=>{
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');
  const token=currentUser.session.access_token;

  const load=async()=>{setLoading(true);const u=await sbGetAllProfiles(token);setUsers(u);setLoading(false);};
  useEffect(()=>{load();},[]);

  const saveUser=async()=>{
    setSaving(true);setError('');
    try{
      if(!form.id){
        // Create new user
        if(!form.email||!form.password){throw new Error('Email i hasło są wymagane.');}
        const newUser=await sbCreateUser(form.email,form.password,token);
        // Profile created by trigger, update it
        await new Promise(r=>setTimeout(r,1000)); // wait for trigger
        await sbUpdateProfile(newUser.id,{
          full_name:form.full_name||form.email,
          role:form.role||'pracownik',
          driver_name:form.driver_name||null,
          modules:form.modules||['dashboard','orders','trips'],
        },token);
      }else{
        // Update existing
        await sbUpdateProfile(form.id,{
          full_name:form.full_name,
          role:form.role,
          driver_name:form.driver_name||null,
          modules:form.modules||['dashboard'],
        },token);
      }
      await load();setModal(false);
    }catch(e){setError(e.message);}
    finally{setSaving(false);}
  };

  const toggleModule=mod=>{
    const mods=form.modules||[];
    setForm(p=>({...p,modules:mods.includes(mod)?mods.filter(m=>m!==mod):[...mods,mod]}));
  };

  if(loading)return<div style={{padding:20,color:'#888',fontSize:11}}>Ładowanie użytkowników...</div>;

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <h2 style={{fontSize:15,fontWeight:500,margin:0}}>Użytkownicy systemu</h2>
      <button style={C.btnP} onClick={()=>{setForm({role:'pracownik',modules:['dashboard','orders','trips']});setError('');setModal(true)}}><i className="ti ti-plus"/> Dodaj użytkownika</button>
    </div>
    <div style={C.card}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr>{['Użytkownik','Email','Rola','Moduły','Kierowca',''].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
        <tbody>{users.map(u=>(
          <tr key={u.id}>
            <td style={{...C.td,fontWeight:500}}>{u.full_name||'–'}</td>
            <td style={C.td}>{u.email}</td>
            <td style={C.td}><span style={bdg(u.role==='admin'?'amber':'blue')}>{u.role==='admin'?'Admin':'Pracownik'}</span></td>
            <td style={{...C.td,fontSize:10,maxWidth:200}}>{(u.modules||[]).length} modułów</td>
            <td style={C.td}>{u.driver_name||'–'}</td>
            <td style={C.td}>{u.id!==currentUser.session.user.id&&<button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm({...u,modules:u.modules||[]});setError('');setModal(true)}}><i className="ti ti-edit"/></button>}</td>
          </tr>
        ))}</tbody>
      </table>
    </div>

    {modal&&<Modal title={form.id?'Edytuj użytkownika':'Nowy użytkownik'} onClose={()=>setModal(false)}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {!form.id&&<><div><label style={C.lbl}>Email</label><input style={C.inp} type="email" value={form.email||''} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
        <div><label style={C.lbl}>Hasło tymczasowe</label><input style={C.inp} type="text" value={form.password||''} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div></>}
        <div><label style={C.lbl}>Imię i nazwisko</label><input style={C.inp} value={form.full_name||''} onChange={e=>setForm(p=>({...p,full_name:e.target.value}))}/></div>
        <div><label style={C.lbl}>Rola</label><select style={C.inp} value={form.role||'pracownik'} onChange={e=>setForm(p=>({...p,role:e.target.value,modules:e.target.value==='admin'?ALL_MODULES.map(m=>m.id):p.modules}))}>
          <option value="pracownik">Pracownik</option><option value="admin">Admin (pełny dostęp)</option>
        </select></div>
        <div><label style={C.lbl}>Powiązany kierowca (opcjonalnie — filtruje wyjazdy)</label><input style={C.inp} placeholder="Imię Nazwisko" value={form.driver_name||''} onChange={e=>setForm(p=>({...p,driver_name:e.target.value}))}/></div>
        {form.role!=='admin'&&<div><label style={C.lbl}>Dostępne moduły</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:4}}>
            {ALL_MODULES.map(m=><label key={m.id} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,cursor:'pointer',padding:'3px 8px',background:(form.modules||[]).includes(m.id)?'#E6F1FB':'#f5f4f0',borderRadius:20,border:`0.5px solid ${(form.modules||[]).includes(m.id)?'#B5D4F4':'transparent'}`}}>
              <input type="checkbox" checked={(form.modules||[]).includes(m.id)} onChange={()=>toggleModule(m.id)} style={{width:11,height:11}}/>{m.label}
            </label>)}
          </div>
        </div>}
        {error&&<div style={{fontSize:11,color:'#A32D2D',padding:'6px 10px',background:'#FCEBEB',borderRadius:7}}>{error}</div>}
        <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
          <button style={C.btn} onClick={()=>setModal(false)}>Anuluj</button>
          <button style={C.btnP} onClick={saveUser} disabled={saving}>{saving?'Zapisywanie...':'Zapisz'}</button>
        </div>
      </div>
    </Modal>}
  </div>);
};

function App(){
  const [active,setActive]=useState('dashboard');
  const [sbStatus,setSbStatus]=useState('connecting');
  const [currentUser,setCurrentUser]=useState(()=>{
    // Restore session from localStorage
    try{const s=localStorage.getItem('tm_session');return s?JSON.parse(s):null;}catch{return null;}
  });

  useEffect(()=>{
    fetch(`${SB_URL}/rest/v1/orders?select=id&limit=1`,{headers:SB_HEADERS})
      .then(r=>setSbStatus(r.ok?'ok':'error'))
      .catch(()=>setSbStatus('error'));
    // Refresh profile for existing session
    if(currentUser?.session?.user?.id&&!currentUser.profile){
      sbGetProfile(currentUser.session.user.id,currentUser.session.access_token).then(p=>{
        if(p){
          const updated={...currentUser,profile:p};
          setCurrentUser(updated);
          localStorage.setItem('tm_session',JSON.stringify(updated));
        }
      }).catch(()=>{});
    }
  },[]);

  const handleLogin=({session,profile})=>{
    const user={session,profile};
    setCurrentUser(user);
    localStorage.setItem('tm_session',JSON.stringify(user));
    // Load profile in background if not available
    if(!profile&&session?.user?.id){
      sbGetProfile(session.user.id,session.access_token).then(p=>{
        if(p){
          const updated={session,profile:p};
          setCurrentUser(updated);
          localStorage.setItem('tm_session',JSON.stringify(updated));
        }
      }).catch(()=>{});
    }
  };

  const handleLogout=async()=>{
    if(currentUser?.session?.access_token)await sbSignOut(currentUser.session.access_token);
    setCurrentUser(null);
    localStorage.removeItem('tm_session');

          <span style={{fontSize:11,fontWeight:500,color:'#888'}} className="tm-hide-mobile">{profile.full_name||profile.email?.split('@')[0]}</span>
          {/* Mobile controls — top right */}
          <button className="tm-mobile-only" onClick={()=>window.location.reload()} style={{background:'none',border:'none',cursor:'pointer',padding:'5px',color:'#888',display:'none',alignItems:'center'}} title="Odśwież"><i className="ti ti-refresh" style={{fontSize:21}}/></button>
          <button className="tm-mobile-only" onClick={()=>setMobileMenuOpen(p=>!p)} style={{background:'none',border:'none',cursor:'pointer',padding:'5px',display:'none',flexDirection:'column',gap:4.5,alignItems:'center',justifyContent:'center',width:32,height:32}} aria-label="Menu">
            <div style={{width:20,height:2,background:'#1a1a18',borderRadius:2,transition:'all 0.2s',transform:isMobileMenuOpen?'rotate(45deg) translateY(6.5px)':'none'}}/>
            <div style={{width:20,height:2,background:'#1a1a18',borderRadius:2,transition:'all 0.2s',opacity:isMobileMenuOpen?0:1}}/>
            <div style={{width:20,height:2,background:'#1a1a18',borderRadius:2,transition:'all 0.2s',transform:isMobileMenuOpen?'rotate(-45deg) translateY(-6.5px)':'none'}}/>
          </button>
        </div>
      </header>
      <div style={C.content} className="tm-content">
        {active==='dashboard'&&<Dashboard db={effectiveDb}/>}
        {active==='company'&&<Company db={effectiveDb}/>}
        {active==='contractors'&&<Contractors db={effectiveDb}/>}
        {active==='kadry'&&<Kadry db={effectiveDb}/>}
        {active==='vehicles'&&<Vehicles db={effectiveDb} onGoToRepairs={reg=>{setRepairFilter({vehicle:reg});setActive('repairs');}}/>}
        {active==='repairs'&&<Repairs db={effectiveDb} initialFilter={repairFilter} onFilterApplied={()=>setRepairFilter(null)}/>}
        {active==='orders'&&<Orders db={effectiveDb} onCreateInvoice={o=>{setPendingInvoice(o);setActive('invoices');}} onOpenInvoicePreview={id=>{setInvoicePreviewTarget(id);setActive('invoices');}}/>}
        {active==='invoices'&&<Invoices db={effectiveDb} pendingInvoice={pendingInvoice} onClearPending={()=>setPendingInvoice(null)} openPreviewId={invoicePreviewTarget} onPreviewOpened={()=>setInvoicePreviewTarget(null)}/>}
        {active==='finanse'&&<Finanse db={effectiveDb}/>}
        {active==='trips'&&<Trips db={effectiveDb}/>}
        {active==='fines'&&<Fines db={effectiveDb}/>}
        {active==='planning'&&<Planning db={effectiveDb}/>}
        {active==='settings'&&<Settings db={effectiveDb}/>}
        {active==='users'&&isAdmin&&<UserManagement currentUser={currentUser}/>}
      </div>
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);




</script>
<script>
(function() {
  function boot() {
    var src = document.getElementById('app-src').textContent;
    try {
      var compiled = Babel.transform(src, {
        presets: ['react']
      }).code;
      eval(compiled);
      document.getElementById('loading').style.display = 'none';
    } catch(e) {
      document.getElementById('loading').innerHTML =
        '<p style="color:#A32D2D;padding:20px;font-family:sans-serif;max-width:700px;font-size:13px"><strong>Błąd ładowania aplikacji:</strong><br/><code style="font-size:11px;white-space:pre-wrap">' + e.message + '</code></p>';
      console.error(e);
    }
  }

  function loadScript(src, cb) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    s.onerror = function() {
      document.getElementById('loading').innerHTML =
        '<p style="color:#A32D2D;padding:20px;font-family:sans-serif">Błąd ładowania bibliotek. Sprawdź połączenie z internetem.</p>';
    };
    document.head.appendChild(s);
  }

  loadScript('https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js', function() {
    loadScript('https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js', function() {
      loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js', function() {
        setTimeout(boot, 10);
      });
    });
  });
})();
</script>
</body>
</html>
