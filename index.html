  </fa:Podmiot2>
  <fa:Fa>
    <fa:KodWaluty>${currency}</fa:KodWaluty>${eurRow}
    <fa:P_1>${issueDate}</fa:P_1>
    <fa:P_1M>${saleDate}</fa:P_1M>
    <fa:P_2>${esc(inv.number)}</fa:P_2>
    <fa:RodzajFaktury>${docType==='korekta'?'KOR':docType==='nota'?'UPR':'VAT'}</fa:RodzajFaktury>${corrRow}
    <fa:DodatkowyOpis>
      <fa:Klucz>Forma płatności</fa:Klucz>
      <fa:Wartosc>${esc(inv.payment_method||'przelew')}</fa:Wartosc>
    </fa:DodatkowyOpis>
    <fa:FaWiersze>${lines}
    </fa:FaWiersze>
    ${vatRows}
    <fa:P_13_1>${tNet.toFixed(2)}</fa:P_13_1>
    <fa:P_14_1>${tVat.toFixed(2)}</fa:P_14_1>
    <fa:P_15>${tGross.toFixed(2)}</fa:P_15>
    <fa:Adnotacje>
      <fa:P_16>2</fa:P_16>
      <fa:P_17>2</fa:P_17>
      <fa:P_18>2</fa:P_18>
      <fa:P_18A>2</fa:P_18A>
      <fa:P_19>2</fa:P_19>
      <fa:P_22>2</fa:P_22>
      <fa:P_23>2</fa:P_23>
      <fa:P_PMarzy>2</fa:P_PMarzy>
    </fa:Adnotacje>
    <fa:RodzajFakturyDla>
      <fa:B_SPV>false</fa:B_SPV>
      <fa:B_SPV_DOSTAWCA>false</fa:B_SPV_DOSTAWCA>
      <fa:B_MRzT>false</fa:B_MRzT>
    </fa:RodzajFakturyDla>
  </fa:Fa>
</fa:Faktura>`;
};

// Send invoice to KSeF — returns {refNo} or throws
const sendToKSeF=async(inv,company,settings)=>{
  const env=settings.ksef_env==='prod'?KSEF_ENV.prod:KSEF_ENV.test;
  const nip=(inv.seller_nip||company?.nip||'').replace(/[^0-9]/g,'');
  const token=settings.ksef_token||'';
  if(!token)throw new Error('Brak tokenu KSeF. Uzupełnij w Ustawieniach → KSeF.');
  if(!nip)throw new Error('Brak NIP sprzedawcy. Uzupełnij w Danych firmy.');

  // 1. Initiate session
  const sessionRes=await fetch(`${env}/online/Session/InitToken`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contextIdentifier:{type:'onip',identifier:nip},
      credentials:{token},
    }),
  });
  if(!sessionRes.ok){const t=await sessionRes.text();throw new Error(`Błąd inicjacji sesji (${sessionRes.status}): ${t}`);}
  const sessionData=await sessionRes.json();
  const sessionToken=sessionData.sessionToken?.token||sessionData.token;
  if(!sessionToken)throw new Error('Nie otrzymano tokenu sesji KSeF.');

  // 2. Prepare XML and encode as Base64
  const xml=generateKSeFXML(inv,company);
  const b64=btoa(unescape(encodeURIComponent(xml)));
  const hash=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(xml));
  const hashB64=btoa(String.fromCharCode(...new Uint8Array(hash)));

  // 3. Send invoice
  const sendRes=await fetch(`${env}/online/Invoice/Send`,{
    method:'POST',
    headers:{'Content-Type':'application/json','SessionToken':sessionToken},
    body:JSON.stringify({
      invoiceHash:{hashSHA:{algorithm:'SHA-256',encoding:'Base64',value:hashB64},fileSize:xml.length},
      invoicePayload:{type:'plain',invoiceBody:b64},
    }),
  });
  if(!sendRes.ok){const t=await sendRes.text();throw new Error(`Błąd wysyłki faktury (${sendRes.status}): ${t}`);}
  const sendData=await sendRes.json();
  const refNo=sendData.elementReferenceNumber;

  // 4. Terminate session
  await fetch(`${env}/online/Session/Terminate`,{
    method:'GET',
    headers:{'SessionToken':sessionToken},
  }).catch(()=>{});

  return{refNo,xml,sessionToken};
};

const Invoices=({db,pendingInvoice,onClearPending,openPreviewId,onPreviewOpened})=>{
  const [invoices,setInvoices]=db.invoices;const [company]=db.company;const [contractors]=db.contractors;const [orders]=db.orders;const [settings,setSettings]=db.settings;
  const [modal,setModal]=useState(false);const [preview,setPreview]=useState(null);const [form,setForm]=useState({});
  const [items,setItems]=useState([{description:'Zlecenie transportowe TZa',qty:1,price:'',vat:'23'}]);
  const [gL,setGL]=useState(false);const [gE,setGE]=useState('');
  const [eurRate,setEurRate]=useState(null);const [eurOverride,setEurOverride]=useState('');
  const [repCols,setRepCols]=useStore('tm_report_cols_invoices',INVOICE_REPORT_COLS.map(c=>c.key));
  const [ksefStatus,setKsefStatus]=useState(null); // {loading,error,refNo}

  // Open preview for invoice requested from Orders module
  useEffect(()=>{
    if(openPreviewId){
      const inv=invoices.find(i=>i.id===openPreviewId);
      if(inv)setPreview(inv);
      onPreviewOpened&&onPreviewOpened();
    }
  },[openPreviewId]);

  // Open modal pre-filled from order when pendingInvoice arrives
  React.useEffect(()=>{
    if(!pendingInvoice)return;
    const addr=[company.address,company.zip_city].filter(Boolean).join(', ');
    const sd=pendingInvoice.unload_date||pendingInvoice.load_date||today();
    setEurRate(null);setEurOverride('');
    const desc=`Zlecenie transportowe TZa ${pendingInvoice.order_number||pendingInvoice.number||''}`.trim();
    setForm({
      currency:'EUR',
      issue_date:today(),
      sale_date:sd,
      payment_days:company.default_payment_days||'14',
      payment_method:company.default_payment_method||'przelew',
      seller_name:company.name||'',
      seller_nip:company.nip||'',
      seller_address:addr||'',
      seller_bank:company.bank_account_eur||company.bank_account||'',
      buyer_name:pendingInvoice.client_name||'',
      buyer_nip:pendingInvoice.client_nip||'',
      buyer_address:'',
      _from_order:pendingInvoice.number,
    });
    setItems([{description:desc,qty:1,price:pendingInvoice.rate||'',vat:'23'}]);
    setModal(true);
    fetchEurRate(sd);
    onClearPending&&onClearPending();
  },[pendingInvoice]);
  const addItem=()=>setItems(p=>[...p,{description:'Zlecenie transportowe TZa',qty:1,price:'',vat:'23'}]);
  const remItem=i=>setItems(p=>p.filter((_,j)=>j!==i));
  const upItem=(i,k,v)=>setItems(p=>p.map((x,j)=>j===i?{...x,[k]:v}:x));
  const net=it=>(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);
  const tNet=items.reduce((s,i)=>s+net(i),0);const tVat=items.reduce((s,i)=>s+net(i)*(parseFloat(i.vat)||0)/100,0);const tGross=tNet+tVat;
  const sym=form.currency==='EUR'?'€':'zł';const activeRate=eurOverride?parseFloat(eurOverride):eurRate?.rate;
  const fetchEurRate=async sd=>{
    if(!sd){setEurRate(null);return;}setEurRate(p=>({...p,loading:true,error:''}));
    try{
      const end=new Date(sd);end.setDate(end.getDate()-1);
      const start=new Date(end);start.setDate(start.getDate()-10);
      const endStr=end.toISOString().split('T')[0];
      const startStr=start.toISOString().split('T')[0];
      const r=await fetch(`https://api.nbp.pl/api/exchangerates/rates/A/EUR/${startStr}/${endStr}/?format=json`);
      if(r.ok){
        const d=await r.json();
        const list=d?.rates||[];
        if(list.length>0){
          const last=list[list.length-1]; // most recent = last business day before sale_date
          const rate=last.mid;const dt=last.effectiveDate;
          setEurRate({rate,date:dt,loading:false,error:''});
          setForm(p=>({...p,eur_rate:rate.toFixed(4),eur_rate_date:dt}));
          setEurOverride('');
          return;
        }
      }
      throw new Error('Brak danych');
    }catch{setEurRate({rate:null,date:null,loading:false,error:'Nie udało się pobrać kursu NBP. Wpisz ręcznie.'});}
  };
  // Fetch NBP rate for an exact date (or the last business day on/before it), used by manual date picker
  const fetchEurRateExact=async dateStr=>{
    if(!dateStr){setEurRate(null);return;}setEurRate(p=>({...p,loading:true,error:''}));
    try{
      const end=new Date(dateStr);
      const start=new Date(end);start.setDate(start.getDate()-10);
      const endStr=end.toISOString().split('T')[0];
      const startStr=start.toISOString().split('T')[0];
      const r=await fetch(`https://api.nbp.pl/api/exchangerates/rates/A/EUR/${startStr}/${endStr}/?format=json`);
      if(r.ok){
        const d=await r.json();

          setEurRate({rate,date:dt,loading:false,error:''});
          setForm(p=>({...p,eur_rate:rate.toFixed(4),eur_rate_date:dt}));
          setEurOverride('');
          return;
        }
      }
      throw new Error('Brak danych');
    }catch{setEurRate({rate:null,date:null,loading:false,error:'Nie udało się pobrać kursu NBP. Wpisz ręcznie.'});}
  };
  const save=()=>{
    const finalRate=eurOverride||form.eur_rate||null;
    const dtypeCheck=form.doc_type||'faktura';

    // Validation: required fields
    const missing=[];

    if(dtypeCheck!=='nota'&&!form.sale_date)missing.push('Data sprzedaży');
    if(!form.payment_days)missing.push('Termin płatności');
    if(!form.payment_method)missing.push('Forma płatności');
    if(dtypeCheck==='korekta'){
      if(!form.corrects_number)missing.push('Nr korygowanej faktury');
      if(!form.correction_reason)missing.push('Powód korekty');
    }
    // Items: every item must have description, qty, price
    if(items.length===0)missing.push('Przynajmniej jedna pozycja faktury');
    items.forEach((it,i)=>{
      if(!it.description)missing.push(`Pozycja ${i+1}: opis`);
      if(it.qty===''||it.qty===null||it.qty===undefined||parseFloat(it.qty)<=0)missing.push(`Pozycja ${i+1}: ilość`);

      if(it.vat===''||it.vat===null||it.vat===undefined)missing.push(`Pozycja ${i+1}: VAT`);
    });
    // EUR rate required when currency is EUR
    if(form.currency==='EUR'&&(!finalRate||parseFloat(finalRate)<=0))missing.push('Kurs EUR/PLN');

    if(missing.length>0){

      return;

    const issueDate=form.issue_date||today();

    const autoNumber=dtype==='faktura'?`${prefix} - ${nextNum}/${mm}/${yyyy}`:`${prefix}-${nextNum}/${mm}/${yyyy}`;
    const finalNumber=form.number||autoNumber;
    // Check for duplicate number (excluding current doc when editing)
    const duplicate=invoices.find(inv=>inv.number===finalNumber&&inv.id!==form.id);
    if(duplicate){alert(`Numer "${finalNumber}" jest już zajęty przez inny dokument. Zmień numer ręcznie.`);return;}
    let invTotals={total_net:tNet,total_vat:tVat,total_gross:tGross};
    if(dtype==='korekta'&&form.before_net!==undefined){
      const bNet=parseFloat(form.before_net||0),bVat=parseFloat(form.before_vat||0),bGross=parseFloat(form.before_gross||0);
      invTotals={
        total_net:tNet-bNet,
        total_vat:tVat-bVat,
        total_gross:tGross-bGross,
        after_net:tNet,
        after_vat:tVat,
        after_gross:tGross,
      };
    }
    const inv={...form,items,...invTotals,eur_rate:finalRate,eur_rate_date:form.eur_rate_date||null,number:finalNumber,status:form.status||'niezapłacona'};
    if(form.id)setInvoices(p=>p.map(x=>x.id===form.id?{...x,...inv}:x));else setInvoices(p=>[...p,{...inv,id:gid(),created_at:today()}]);setModal(false);

          setForm({doc_type:'faktura',number:(()=>{const _m=sd.slice(5,7),_y=sd.slice(0,4);const _n=invoices.filter(iv=>{const d=iv.issue_date||iv.created_at||'';return d.startsWith(`${_y}-${_m}`)&&(iv.doc_type||'faktura')==='faktura';}).length+1;return `TRANS - ${_n}/${_m}/${_y}`;})(),currency:'EUR',issue_date:today(),sale_date:sd,payment_days:company.default_payment_days||'14',payment_method:company.default_payment_method||'przelew',seller_name:company.name||'',seller_nip:company.nip||'',seller_address:addr||'',seller_bank:company.bank_account_eur||company.bank_account||'',buyer_name:def?.name||'',buyer_nip:def?.nip||'',buyer_address:def?.address||''});
          setItems([{description:'Zlecenie transportowe TZa',qty:1,price:'',vat:'23'}]);setModal(true);fetchEurRate(sd);

// TRIPS


const TACHO_RULES={
  maxDriveDay:9*60,maxDriveDayExtended:10*60,maxDriveWeek:56*60,maxDriveTwoWeeks:90*60,
  minBreakAfter:270,minBreak:45,minDailyRest:11*60,minDailyRestReduced:9*60,minWeeklyRest:45*60,
};
const toMin=t=>{if(!t)return 0;const[h,m]=(t||'').split(':').map(Number);return(h||0)*60+(m||0);};
const fromMin=m=>{if(m===null||m===undefined)return'–';const abs=Math.abs(m);return`${m<0?'-':''}${String(Math.floor(abs/60)).padStart(2,'0')}:${String(abs%60).padStart(2,'0')}`;};
const addMinToTime=(t,min)=>{const base=toMin(t)+min;return fromMin(((base%1440)+1440)%1440);};
const getWeekNum=d=>{const dt=new Date(d);const jan1=new Date(dt.getFullYear(),0,1);const week=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);return`${dt.getFullYear()}-W${String(week).padStart(2,'0')}`;};
const TachoScreen=({entries,setEntries,trip,onClose,onSave})=>{
  const ACTS=[{id:'jazda',label:'🚛 Jazda',color:'#185FA5'},{id:'praca',label:'🔧 Inna praca',color:'#854F0B'},{id:'gotowość',label:'⏳ Gotowość',color:'#5B4FCA'},{id:'odpoczynek',label:'🛏 Odpoczynek',color:'#3B6D11'},{id:'przerwa',label:'☕ Przerwa',color:'#888'}];
  const emptyDay=()=>({id:gid(),date:'',segments:[{id:gid(),type:'jazda',from:'',to:'',notes:''}]});
  const [days,setDays]=useState(()=>{
    if(entries&&entries.length>0)return entries;
    return [{...emptyDay(),date:trip.start_date||today()}];
  });
  const [selDay,setSelDay]=useState(0);
  const upDay=(i,k,v)=>setDays(p=>p.map((d,j)=>j===i?{...d,[k]:v}:d));
  const upSeg=(di,si,k,v)=>setDays(p=>p.map((d,j)=>j!==di?d:{...d,segments:d.segments.map((s,j2)=>j2!==si?s:{...s,[k]:v})}));
  const addSeg=di=>setDays(p=>p.map((d,j)=>j!==di?d:{...d,segments:[...d.segments,{id:gid(),type:'jazda',from:'',to:'',notes:''}]}));
  const delSeg=(di,si)=>setDays(p=>p.map((d,j)=>j!==di?d:{...d,segments:d.segments.filter((_,k)=>k!==si)}));
  const addDay=()=>{
    const lastDate=days[days.length-1]?.date||trip.start_date||today();
    const next=new Date(lastDate);next.setDate(next.getDate()+1);
    setDays(p=>[...p,{...emptyDay(),date:next.toISOString().split('T')[0]}]);
    setSelDay(days.length);
  };
  const dayStats=d=>{
    const segs=(d.segments||[]).filter(s=>s.from&&s.to).sort((a,b)=>a.from.localeCompare(b.from));
    let driveMin=0,workMin=0,breakMin=0,restMin=0;let lastEnd='';let firstStart='';
    segs.forEach(s=>{
      const dur=Math.max(0,toMin(s.to)-toMin(s.from));
      if(s.type==='jazda'){driveMin+=dur;workMin+=dur;}
      else if(s.type==='praca'){workMin+=dur;}
      else if(s.type==='przerwa'){breakMin+=dur;}
      else if(s.type==='odpoczynek'){breakMin+=dur;restMin+=dur;}
      if(s.to>lastEnd)lastEnd=s.to;
      if(!firstStart||s.from<firstStart)firstStart=s.from;
    });
    const violations=[];
    if(driveMin>TACHO_RULES.maxDriveDayExtended)violations.push({type:'danger',msg:`Przekroczenie max jazdy dziennej: ${fromMin(driveMin)} > 10h`});
    else if(driveMin>TACHO_RULES.maxDriveDay)violations.push({type:'warning',msg:`Przedłużony czas jazdy: ${fromMin(driveMin)} > 9h`});
    if(driveMin>=TACHO_RULES.minBreakAfter&&breakMin<TACHO_RULES.minBreak)violations.push({type:'warning',msg:`Brak wymaganej przerwy 45 min (przerwa: ${fromMin(breakMin)})`});
    const nextStart=lastEnd?addMinToTime(lastEnd,TACHO_RULES.minDailyRest):'';
    const nextStartReduced=lastEnd?addMinToTime(lastEnd,TACHO_RULES.minDailyRestReduced):'';
    return{driveMin,workMin,breakMin,restMin,violations,lastEnd,firstStart,nextStart,nextStartReduced,
      driveLeft:Math.max(0,TACHO_RULES.maxDriveDay-driveMin),
      driveLeftExt:Math.max(0,TACHO_RULES.maxDriveDayExtended-driveMin)};
  };
  const weekStats=()=>{
    const startDate=days.find(d=>d.date)?.date||today();
    const startMs=new Date(startDate).getTime();
    const byWeek={};
    days.forEach(d=>{
      if(!d.date)return;
      const dayNum=Math.floor((new Date(d.date).getTime()-startMs)/86400000)+1;
      const weekNum=Math.ceil(dayNum/7);
      const wKey=`Tydzień ${weekNum}`;
      if(!byWeek[wKey])byWeek[wKey]={week:wKey,weekNum,drive:0,work:0,days:0};
      const s=dayStats(d);byWeek[wKey].drive+=s.driveMin;byWeek[wKey].work+=s.workMin;byWeek[wKey].days++;
    });
    return Object.values(byWeek).sort((a,b)=>a.weekNum-b.weekNum);
  };
  const reducedRestsByWeek=()=>{
    const sorted=[...days].filter(d=>d.date).sort((a,b)=>a.date.localeCompare(b.date));
    const startDate=sorted[0]?.date||today();
    const startMs=new Date(startDate).getTime();
    const result={};
    for(let i=1;i<sorted.length;i++){
      const prev=sorted[i-1];const cur=sorted[i];
      const ps=dayStats(prev);const cs=dayStats(cur);
      if(!ps.lastEnd||!cs.firstStart)continue;
      const gap=toMin(cs.firstStart)+1440-toMin(ps.lastEnd);
      if(gap>=TACHO_RULES.minDailyRestReduced&&gap<TACHO_RULES.minDailyRest){
        const dayNum=Math.floor((new Date(cur.date).getTime()-startMs)/86400000)+1;
        const wKey=`Tydzień ${Math.ceil(dayNum/7)}`;
        result[wKey]=(result[wKey]||0)+1;
      }
    }
    return result;
  };
  const allWeeks=weekStats();
  const curDay=days[selDay]||days[0];
  const startDate=days.find(d=>d.date)?.date||today();
  const startMs=new Date(startDate).getTime();
  const curDayNum=curDay?.date?Math.floor((new Date(curDay.date).getTime()-startMs)/86400000)+1:1;
  const curWeekNum=Math.ceil(curDayNum/7);
  const curWeekKey=`Tydzień ${curWeekNum}`;
  const curW=allWeeks.find(w=>w.week===curWeekKey)||{drive:0,work:0,days:0};
  const prevW=allWeeks.find(w=>w.weekNum===curWeekNum-1)||{drive:0};
  const totalDrive=curW.drive+(curWeekNum>1?prevW.drive:0);
  const twoWeekViolations=allWeeks.map((w,i)=>{
    if(i===0)return null;
    const prev=allWeeks[i-1];
    const sum=w.drive+prev.drive;
    return sum>TACHO_RULES.maxDriveTwoWeeks?{label:`${prev.week} + ${w.week}`,sum}:null;
  }).filter(Boolean);
  const reducedRests=reducedRestsByWeek();
  const cur=curDay?dayStats(curDay):{driveMin:0,workMin:0,breakMin:0,violations:[],nextStart:'',nextStartReduced:'',driveLeft:TACHO_RULES.maxDriveDay,driveLeftExt:TACHO_RULES.maxDriveDayExtended};
  const typeColor=t=>ACTS.find(a=>a.id===t)?.color||'#888';
  const Bar=({val,max,col,h=5})=><div style={{height:h,background:'#e0dfd8',borderRadius:h/2,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,Math.round(val/max*100))}%`,background:col,borderRadius:h/2}}/></div>;

  // Smart time input component
  const TimeInput=({value,onChange,label})=>{
    const [raw,setRaw]=useState(value||'');const [focused,setFocused]=useState(false);
    useEffect(()=>{if(!focused)setRaw(value||'');},[value,focused]);
    const parse=s=>{if(!s)return'';const clean=s.replace(/[^0-9]/g,'');if(clean.length===3)return`0${clean[0]}:${clean.slice(1)}`;if(clean.length===4)return`${clean.slice(0,2)}:${clean.slice(2)}`;if(clean.length<=2)return clean.length===1?`0${clean}:00`:`${clean}:00`;return s;};
    const commit=s=>{const v=parse(s);setRaw(v);onChange(v);};
    const adj=m=>{const cur=toMin(value||'00:00');const next=((cur+m)+1440)%1440;const nv=fromMin(next);setRaw(nv);onChange(nv);};
    return<div style={{display:'flex',flexDirection:'column',gap:2}}>
      <label style={C.lbl}>{label}</label>
      <div style={{display:'flex',gap:3,alignItems:'center'}}>
        <button type="button" onClick={()=>adj(-15)} style={{...C.btn,padding:'4px 6px',fontSize:11,minWidth:28,fontWeight:600}}>-</button>
        <input style={{...C.inp,width:72,textAlign:'center',fontSize:15,fontWeight:600,letterSpacing:'0.05em'}} value={focused?raw:(value||'')} placeholder="08:00"
          onFocus={()=>{setFocused(true);setRaw(value||'');}} onChange={e=>setRaw(e.target.value)}
          onBlur={e=>{setFocused(false);commit(e.target.value);}}
          onKeyDown={e=>{if(e.key==='Enter'||e.key===':')commit(raw);if(e.key==='ArrowUp')adj(15);if(e.key==='ArrowDown')adj(-15);}}/>
        <button type="button" onClick={()=>adj(15)} style={{...C.btn,padding:'4px 6px',fontSize:11,minWidth:28,fontWeight:600}}>+</button>
      </div>
    </div>;
  };

  return(<div style={{position:'fixed',inset:0,background:'#f5f4f0',zIndex:20000,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    {/* Topbar */}
    <div style={{background:'#1a1a18',color:'#fff',padding:'10px 18px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
      <button style={{...C.btn,background:'transparent',color:'#fff',border:'0.5px solid rgba(255,255,255,0.3)',padding:'4px 10px'}} onClick={onClose}><i className="ti ti-arrow-left"/> Wróć</button>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:600}}><i className="ti ti-clock-record" style={{marginRight:6}}/>Tachograf</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.6)'}}>{trip.driver_name||'Kierowca'} · {trip.vehicle_reg||'Pojazd'} · {trip.start_date} → {trip.end_date||'w trasie'}</div>
      </div>
      <button style={{...C.btnP,background:'#3B6D11',border:'none',padding:'6px 14px'}} onClick={()=>{setEntries(days);onSave(days);}}><i className="ti ti-device-floppy"/> Zapisz</button>
    </div>

    {/* Main layout — 3 columns on desktop, stacked on mobile via CSS */}
    <div style={{flex:1,display:'flex',overflow:'hidden'}} className="tacho-layout">

      {/* Day list sidebar */}
      <div className="tacho-sidebar" style={{background:'#fff',borderRight:'0.5px solid rgba(0,0,0,0.1)',display:'flex',flexDirection:'column',flexShrink:0}}>

  const [fPaid,setFPaid]=useState('');       // ''|'paid'|'unpaid'
  const [fKsef,setFKsef]=useState('');       // ''|'yes'|'no'
  const [fCat,setFCat]=useState('');
  const [fSearch,setFSearch]=useState('');   // search in seller/description/nr faktury
  const [fAmtMin,setFAmtMin]=useState('');
  const [fAmtMax,setFAmtMax]=useState('');
  const [showFilters,setShowFilters]=useState(false);

  const addCat=()=>{const t=newCat.trim();if(!t||costCategories.includes(t))return;setCostCategories(p=>[...p,t]);setNewCat('')};
  const remCat=t=>{setCostCategories(p=>p.filter(x=>x!==t));if(form.category===t)setForm(p=>({...p,category:''}))};

  const hFile=async e=>{
    const file=e.target.files[0];if(!file)return;setFileLoading(true);
    if(file.type.startsWith('image/')){
      const img=new Image();const url=URL.createObjectURL(file);
      img.onload=()=>{
        const maxW=1200;const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement('canvas');canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        setForm(p=>({...p,doc_file:canvas.toDataURL('image/jpeg',0.78),doc_file_name:file.name}));
        URL.revokeObjectURL(url);setFileLoading(false);
      };
      img.onerror=()=>{URL.revokeObjectURL(url);setFileLoading(false);};
      img.src=url;
    }else{
      const rd=new FileReader();
      rd.onload=ev=>{setForm(p=>({...p,doc_file:ev.target.result,doc_file_name:file.name}));setFileLoading(false);};
      rd.onerror=()=>setFileLoading(false);
      rd.readAsDataURL(file);
    }
    e.target.value='';
  };

  const save=()=>{
    const item={...form,type:costTab};
    if(form.id)setCosts(p=>p.map(x=>x.id===form.id?{...x,...item}:x));
    else setCosts(p=>[...p,{...item,id:gid(),created_at:today()}]);
    setModal(false);
  };
  const F=(k,l,t='text',full=false)=>(<div style={full?{gridColumn:'span 2'}:{}}><label style={C.lbl}>{l}</label><input style={C.inp} type={t} value={form[k]||''} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>);

  const er=parseFloat(settings?.eur_rate)||0;
  const names=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  const [selYear,selMM]=selMonth.split('-');
  const monthLabel=`${names[parseInt(selMM)-1]} ${selYear}`;

  // Orders for selected month
  const monthOrders=orders.filter(o=>(o.load_date||'').startsWith(selMonth));
  const invoicedOrders=monthOrders.filter(o=>invoices.some(inv=>o.number&&inv._from_order===o.number));
  const nonInvoicedOrders=monthOrders.filter(o=>!invoices.some(inv=>o.number&&inv._from_order===o.number));
  const sumOrders=list=>list.reduce((s,o)=>{
    const rate=parseFloat(o.rate)||0;
    if((o.currency||'EUR')==='EUR')s.eur+=rate;else s.pln+=rate;
    return s;
  },{eur:0,pln:0});

  // Invoices for selected month (by issue_date)
  const monthInvoices=invoices.filter(inv=>(inv.issue_date||'').startsWith(selMonth));
  const invSummary=monthInvoices.reduce((s,inv)=>{
    const net=parseFloat(inv.total_net||0);const vat=parseFloat(inv.total_vat||0);const gross=parseFloat(inv.total_gross||0);const rate=parseFloat(inv.eur_rate||0);
    if(inv.currency==='EUR'){s.netEUR+=net;s.vatEUR+=vat;s.grossEUR+=gross;if(rate>0){s.netPLN+=net*rate;s.vatPLN+=vat*rate;s.grossPLN+=gross*rate;s.hasPLN=true;}}
    else{s.netPLN+=net;s.vatPLN+=vat;s.grossPLN+=gross;}
    return s;
  },{netEUR:0,vatEUR:0,grossEUR:0,netPLN:0,vatPLN:0,grossPLN:0,hasPLN:false});

  // Costs filtered by tab and month
  const tabCosts=costs.filter(c=>(c.type||'realne')===costTab);
  const monthCosts=tabCosts.filter(c=>{
    if(!(c.date||'').startsWith(selMonth))return false;
    if(fPaid==='paid'&&!c.paid)return false;
    if(fPaid==='unpaid'&&c.paid)return false;
    if(fKsef==='yes'&&!c.ksef)return false;
    if(fKsef==='no'&&c.ksef)return false;
    if(fCat&&c.category!==fCat)return false;
    if(fSearch){const q=fSearch.toLowerCase();if(!(c.seller||'').toLowerCase().includes(q)&&!(c.description||'').toLowerCase().includes(q)&&!(c.invoice_number||'').toLowerCase().includes(q))return false;}
    if(fAmtMin&&parseFloat(c.amount_gross||0)<parseFloat(fAmtMin))return false;
    if(fAmtMax&&parseFloat(c.amount_gross||0)>parseFloat(fAmtMax))return false;
    return true;
  });
  const activeFilters=[fPaid,fKsef,fCat,fSearch,fAmtMin,fAmtMax].filter(Boolean).length;
  const totalCostsNet=monthCosts.reduce((s,c)=>{
    const amt=parseFloat(c.amount_net)||0;
    if((c.currency||'PLN')==='EUR')s.eur+=amt;else s.pln+=amt;
    return s;
  },{eur:0,pln:0});
  const totalCostsGross=monthCosts.reduce((s,c)=>{
    const amt=parseFloat(c.amount_gross)||0;
    if((c.currency||'PLN')==='EUR')s.eur+=amt;else s.pln+=amt;
    return s;
  },{eur:0,pln:0});

  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
      <h1 style={{fontSize:18,fontWeight:500,margin:0}}>Finanse</h1>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <button style={{...C.btn,padding:'6px 10px'}} onClick={()=>{
          let y=parseInt(selYear),m=parseInt(selMM)-1;if(m<1){m=12;y--;}
          setSelMonth(`${y}-${String(m).padStart(2,'0')}`);
        }}><i className="ti ti-chevron-left"/></button>
        <select style={{...C.inp,width:130}} value={selMM} onChange={e=>setSelMonth(`${selYear}-${e.target.value}`)}>
          {names.map((n,i)=><option key={n} value={String(i+1).padStart(2,'0')}>{n}</option>)}
        </select>
        <select style={{...C.inp,width:90}} value={selYear} onChange={e=>setSelMonth(`${e.target.value}-${selMM}`)}>
          {Array.from({length:7},(_,i)=>parseInt(today().slice(0,4))-3+i).map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <button style={{...C.btn,padding:'6px 10px'}} onClick={()=>{
          let y=parseInt(selYear),m=parseInt(selMM)+1;if(m>12){m=1;y++;}
          setSelMonth(`${y}-${String(m).padStart(2,'0')}`);
        }}><i className="ti ti-chevron-right"/></button>
      </div>
    </div>

    {/* Summary: orders */}
    <div style={C.card}>
      <div style={{fontSize:12,fontWeight:500,marginBottom:10,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-clipboard-list"/>Zlecenia — {monthLabel}</div>
      <div style={C.g3}>
        {(()=>{const s=sumOrders(invoicedOrders);return<div style={C.stat}>
          <div style={{fontSize:10,color:'#888',marginBottom:2}}>Zafakturowane</div>
          <div style={{fontSize:18,fontWeight:500,color:'#3B6D11'}}>{invoicedOrders.length} <span style={{fontSize:11,color:'#888',fontWeight:400}}>zleceń</span></div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>{s.eur>0&&<span>{s.eur.toFixed(2)} € · </span>}{(s.eur*er+s.pln).toFixed(2)} zł{er>0&&s.eur>0&&<span style={{fontSize:9,color:'#aaa'}}> (kurs {er.toFixed(4)})</span>}</div>
        </div>;})()}
        {(()=>{const s=sumOrders(nonInvoicedOrders);return<div style={C.stat}>
          <div style={{fontSize:10,color:'#888',marginBottom:2}}>Niezafakturowane</div>
          <div style={{fontSize:18,fontWeight:500,color:'#A32D2D'}}>{nonInvoicedOrders.length} <span style={{fontSize:11,color:'#888',fontWeight:400}}>zleceń</span></div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>{s.eur>0&&<span>{s.eur.toFixed(2)} € · </span>}{(s.eur*er+s.pln).toFixed(2)} zł{er>0&&s.eur>0&&<span style={{fontSize:9,color:'#aaa'}}> (kurs {er.toFixed(4)})</span>}</div>
        </div>;})()}
        {(()=>{const s=sumOrders(monthOrders);return<div style={C.stat}>
          <div style={{fontSize:10,color:'#888',marginBottom:2}}>Razem</div>
          <div style={{fontSize:18,fontWeight:500}}>{monthOrders.length} <span style={{fontSize:11,color:'#888',fontWeight:400}}>zleceń</span></div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>{s.eur>0&&<span>{s.eur.toFixed(2)} € · </span>}{(s.eur*er+s.pln).toFixed(2)} zł{er>0&&s.eur>0&&<span style={{fontSize:9,color:'#aaa'}}> (kurs {er.toFixed(4)})</span>}</div>
        </div>;})()}
      </div>
      {er===0&&<div style={{fontSize:10,color:'#854F0B',marginTop:8}}><i className="ti ti-alert-triangle" style={{marginRight:3}}/>Brak kursu EUR/PLN — ustaw go w Panelu głównym, aby przeliczyć kwoty w EUR.</div>}
    </div>

    {/* Summary: invoices */}
    <div style={C.card}>
      <div style={{fontSize:12,fontWeight:500,marginBottom:10,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-receipt"/>Faktury wystawione — {monthLabel}</div>
      {monthInvoices.length===0?<div style={{fontSize:11,color:'#888'}}>Brak faktur w tym miesiącu.</div>:
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
        <thead><tr>
          <th style={{...C.th,textAlign:'left',width:'35%'}}>Podsumowanie ({monthInvoices.length} dok.)</th>
          {invSummary.netEUR>0&&<th style={{...C.th,textAlign:'right'}}>EUR</th>}
          <th style={{...C.th,textAlign:'right'}}>PLN</th>
        </tr></thead>
        <tbody>
          <tr><td style={{...C.td,color:'#888'}}>Suma netto</td>
            {invSummary.netEUR>0&&<td style={{...C.td,textAlign:'right'}}>{invSummary.netEUR.toFixed(2)} €</td>}
            <td style={{...C.td,textAlign:'right'}}>{invSummary.netPLN.toFixed(2)} zł</td>
          </tr>
          <tr><td style={{...C.td,color:'#888'}}>Suma VAT</td>
            {invSummary.netEUR>0&&<td style={{...C.td,textAlign:'right'}}>{invSummary.vatEUR.toFixed(2)} €</td>}
            <td style={{...C.td,textAlign:'right'}}>{invSummary.vatPLN.toFixed(2)} zł</td>
          </tr>
          <tr style={{background:'#f5f4f0',fontWeight:600}}>
            <td style={{...C.td,fontWeight:600}}>Suma brutto</td>
            {invSummary.netEUR>0&&<td style={{...C.td,textAlign:'right',fontSize:13,fontWeight:600}}>{invSummary.grossEUR.toFixed(2)} €</td>}
            <td style={{...C.td,textAlign:'right',fontSize:13,fontWeight:600}}>{invSummary.grossPLN.toFixed(2)} zł</td>
          </tr>
        </tbody>
      </table>}
    </div>

    {/* Costs */}
    <div style={C.card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
        <div style={{fontSize:12,fontWeight:500,display:'flex',alignItems:'center',gap:5}}><i className="ti ti-wallet"/>Koszty</div>
        <button style={C.btnP} onClick={()=>{setForm({date:today(),currency:'PLN',paid:false,ksef:false});setManualCat(false);setModal(true)}}><i className="ti ti-plus"/> Dodaj koszt</button>
      </div>
      <div style={{display:'flex',gap:5,marginBottom:10}}>
        {[{id:'realne',label:'Koszty realne'},{id:'księgowe',label:'Koszty do księgowego'}].map(t=>
          <button key={t.id} style={{...C.btn,...(costTab===t.id?{background:'#f5f4f0',fontWeight:500}:{})}} onClick={()=>setCostTab(t.id)}>{t.label}</button>
        )}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
        <div style={C.stat}>
          <div style={{fontSize:10,color:'#888'}}>Suma kosztów netto — {monthLabel}</div>
          <div style={{fontSize:18,fontWeight:500,color:'#A32D2D'}}>
            {totalCostsNet.eur>0&&<span>{totalCostsNet.eur.toFixed(2)} € · </span>}
            {(totalCostsNet.eur*er+totalCostsNet.pln).toFixed(2)} zł
            {er>0&&totalCostsNet.eur>0&&<span style={{fontSize:9,color:'#aaa',fontWeight:400}}> (kurs {er.toFixed(4)})</span>}
          </div>
        </div>
        <div style={C.stat}>
          <div style={{fontSize:10,color:'#888'}}>Suma kosztów brutto — {monthLabel}</div>
          <div style={{fontSize:18,fontWeight:500,color:'#A32D2D'}}>
            {totalCostsGross.eur>0&&<span>{totalCostsGross.eur.toFixed(2)} € · </span>}
            {(totalCostsGross.eur*er+totalCostsGross.pln).toFixed(2)} zł
            {er>0&&totalCostsGross.eur>0&&<span style={{fontSize:9,color:'#aaa',fontWeight:400}}> (kurs {er.toFixed(4)})</span>}
          </div>
        </div>
      </div>
      {/* Filter bar */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
        <button style={{...C.btn,background:showFilters?'#1a1a18':'',color:showFilters?'#fff':'',position:'relative'}} onClick={()=>setShowFilters(p=>!p)}>
          <i className="ti ti-filter"/> Filtry
          {activeFilters>0&&<span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'#A32D2D',color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{activeFilters}</span>}
        </button>
        <input style={{...C.inp,flex:1,minWidth:140}} placeholder="Szukaj: sprzedawca, opis, nr faktury..." value={fSearch} onChange={e=>setFSearch(e.target.value)}/>
        {activeFilters>0&&<button style={{...C.btn,fontSize:10,color:'#888'}} onClick={()=>{setFPaid('');setFKsef('');setFCat('');setFSearch('');setFAmtMin('');setFAmtMax('');}}><i className="ti ti-x"/> Wyczyść</button>}
      </div>
      {showFilters&&<div style={{background:'#f5f4f0',borderRadius:10,padding:'10px 12px',marginBottom:8,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8}}>
        <div><label style={C.lbl}>Płatność</label><select style={C.inp} value={fPaid} onChange={e=>setFPaid(e.target.value)}>
          <option value="">Wszystkie</option>
          <option value="paid">✓ Zapłacone</option>
          <option value="unpaid">✗ Niezapłacone</option>
        </select></div>
        <div><label style={C.lbl}>KSeF</label><select style={C.inp} value={fKsef} onChange={e=>setFKsef(e.target.value)}>
          <option value="">Wszystkie</option>
          <option value="yes">✓ W KSeF</option>
          <option value="no">– Bez KSeF</option>
        </select></div>
        <div><label style={C.lbl}>Kategoria</label><select style={C.inp} value={fCat} onChange={e=>setFCat(e.target.value)}>
          <option value="">Wszystkie</option>
          {costCategories.map(c=><option key={c} value={c}>{c}</option>)}
        </select></div>
        <div><label style={C.lbl}>Kwota brutto od (zł)</label><input style={C.inp} type="number" step="0.01" value={fAmtMin} onChange={e=>setFAmtMin(e.target.value)} placeholder="np. 100"/></div>
        <div><label style={C.lbl}>Kwota brutto do (zł)</label><input style={C.inp} type="number" step="0.01" value={fAmtMax} onChange={e=>setFAmtMax(e.target.value)} placeholder="np. 5000"/></div>
      </div>}

      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr>{['Data','Kategoria','Sprzedawca','Nr faktury','Opis','Netto','Brutto',costTab==='księgowe'?'Rozliczenie':'Płatność','KSeF','PDF',''].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
        <tbody>{monthCosts.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(c=>(<tr key={c.id}>
          <td style={C.td}>{c.date}</td>
          <td style={C.td}>{c.category?<span style={bdg('gray')}>{c.category}</span>:'–'}</td>
          <td style={C.td}>{c.seller||'–'}</td>
          <td style={{...C.td,fontFamily:'monospace',fontSize:10}}>{c.invoice_number||'–'}</td>
          <td style={{...C.td,maxWidth:200}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.description||'–'}</div></td>
          <td style={C.td}>{c.amount_net?`${parseFloat(c.amount_net).toFixed(2)} ${c.currency||'PLN'}`:'–'}</td>
          <td style={C.td}><strong>{parseFloat(c.amount_gross||0).toFixed(2)} {c.currency||'PLN'}</strong></td>
          <td style={C.td}><button onClick={()=>setCosts(p=>p.map(x=>x.id===c.id?{...x,paid:!x.paid}:x))} style={{...bdg(c.paid?'green':'red'),cursor:'pointer',border:'none',padding:'2px 8px',borderRadius:20,fontSize:10}}>{costTab==='księgowe'?(c.paid?'✓ Rozliczony':'✗ Nierozliczony'):(c.paid?'✓ Zapłacony':'✗ Niezapłacony')}</button></td>
          <td style={C.td}><button onClick={()=>setCosts(p=>p.map(x=>x.id===c.id?{...x,ksef:!x.ksef}:x))} style={{...bdg(c.ksef?'green':'gray'),cursor:'pointer',border:'none',padding:'2px 8px',borderRadius:20,fontSize:10}}>{c.ksef?'✓ KSeF':'– KSeF'}</button></td>
          <td style={C.td}>{c.doc_file?<button style={{...C.btn,padding:'2px 5px',color:'#185FA5'}} onClick={()=>setPdfPreview({data:c.doc_file,name:c.doc_file_name})} title="Podgląd"><i className="ti ti-file-type-pdf"/></button>:<span style={{color:'#aaa',fontSize:10}}>–</span>}</td>
          <td style={C.td}><button style={{...C.btn,padding:'2px 5px'}} onClick={()=>{setForm(c);setManualCat(!costCategories.includes(c.category)&&!!c.category);setModal(true)}}><i className="ti ti-edit"/></button><button style={{...C.btn,padding:'2px 5px',marginLeft:3}} onClick={()=>setCosts(p=>p.filter(x=>x.id!==c.id))}><i className="ti ti-trash"/></button></td>
        </tr>))}</tbody>
      </table>
      {monthCosts.length===0&&<div style={{textAlign:'center',padding:20,color:'#888',fontSize:11}}>Brak kosztów w tym miesiącu — {costTab==='realne'?'Koszty realne':'Koszty do księgowego'}.</div>}
      {monthCosts.length>0&&<div style={{borderTop:'2px solid #1a1a18',padding:'12px 14px',background:'#f5f4f0'}}>
        <div style={{display:'flex',gap:24,flexWrap:'wrap',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,color:'#888',marginBottom:2}}>Suma netto</div>
            <div style={{fontSize:14,fontWeight:600}}>
              {totalCostsNet.eur>0&&<span style={{color:'#185FA5'}}>{totalCostsNet.eur.toFixed(2)} € </span>}
              {totalCostsNet.pln>0&&<span>{totalCostsNet.pln.toFixed(2)} zł</span>}
              {totalCostsNet.eur>0&&er>0&&<span style={{fontSize:10,color:'#aaa',fontWeight:400,marginLeft:4}}>= {(totalCostsNet.eur*er+totalCostsNet.pln).toFixed(2)} zł</span>}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:'#888',marginBottom:2}}>Suma brutto</div>
            <div style={{fontSize:14,fontWeight:700}}>
              {totalCostsGross.eur>0&&<span style={{color:'#185FA5'}}>{totalCostsGross.eur.toFixed(2)} € </span>}
              {totalCostsGross.pln>0&&<span>{totalCostsGross.pln.toFixed(2)} zł</span>}
              {totalCostsGross.eur>0&&er>0&&<span style={{fontSize:10,color:'#aaa',fontWeight:400,marginLeft:4}}>= {(totalCostsGross.eur*er+totalCostsGross.pln).toFixed(2)} zł</span>}
            </div>
          </div>
          <div style={{marginLeft:'auto',fontSize:10,color:'#888'}}>{monthCosts.length} pozycji</div>
        </div>
      </div>}
    </div>

    {modal&&<Modal title={form.id?'Edytuj koszt':`Dodaj koszt — ${costTab==='realne'?'realny':'do księgowego'}`} onClose={()=>setModal(false)} wide>
      <div style={C.g2}>
        {F('date','Data','date')}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}><label style={C.lbl}>Kategoria</label><button style={{...C.btn,padding:'1px 6px',fontSize:10}} onClick={()=>{setManualCat(p=>!p);if(manualCat)setForm(p=>({...p,category:''}))}}>{manualCat?'← Lista':'Wpisz ręcznie'}</button></div>
          {manualCat?<input style={C.inp} value={form.category||''} onChange={e=>setForm(p=>({...p,category:e.target.value}))} placeholder="Wpisz kategorię..."/>:<select style={C.inp} value={form.category||''} onChange={e=>setForm(p=>({...p,category:e.target.value}))}><option value="">Wybierz...</option>{costCategories.map(c=><option key={c}>{c}</option>)}</select>}
        </div>
        {F('seller','Nazwa sprzedawcy')}
        {F('invoice_number','Numer faktury')}
        <div><label style={C.lbl}>Kwota netto</label><input style={C.inp} type="number" step="0.01" value={form.amount_net||''} onChange={e=>{
          const net=e.target.value;
          setForm(p=>{
            const vatRate=parseFloat(p.vat_rate);
            const gross=(net!==''&&!isNaN(vatRate))?(parseFloat(net)*(1+vatRate/100)).toFixed(2):p.amount_gross;
            return {...p,amount_net:net,amount_gross:gross};
          });
        }}/></div>
        <div><label style={C.lbl}>VAT %</label><select style={C.inp} value={form.vat_rate||''} onChange={e=>{
          const vatRate=e.target.value;
          setForm(p=>{
            const net=parseFloat(p.amount_net);
            const gross=(vatRate!==''&&!isNaN(net))?(net*(1+parseFloat(vatRate)/100)).toFixed(2):p.amount_gross;
            return {...p,vat_rate:vatRate,amount_gross:gross};
          });
        }}><option value="">—</option><option value="23">23%</option><option value="8">8%</option><option value="5">5%</option><option value="0">0%</option></select></div>
        <div style={{gridColumn:'span 2'}}><label style={C.lbl}>Kwota brutto</label><div style={{display:'grid',gridTemplateColumns:'1fr 90px',gap:7}}><input style={C.inp} type="number" step="0.01" value={form.amount_gross||''} onChange={e=>setForm(p=>({...p,amount_gross:e.target.value}))}/><select style={C.inp} value={form.currency||'PLN'} onChange={e=>setForm(p=>({...p,currency:e.target.value}))}><option>PLN</option><option>EUR</option></select></div></div>
        {F('description','Opis',undefined,true)}
      </div>

      <div style={{marginTop:10,display:'flex',gap:16,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}><input type="checkbox" id="cost-paid" checked={form.paid||false} onChange={e=>setForm(p=>({...p,paid:e.target.checked}))} style={{width:14,height:14,cursor:'pointer'}}/><label htmlFor="cost-paid" style={{fontSize:12,cursor:'pointer'}}>{costTab==='księgowe'?'Koszt rozliczony':'Koszt zapłacony'}</label></div>
        <div style={{display:'flex',alignItems:'center',gap:7}}><input type="checkbox" id="cost-ksef" checked={form.ksef||false} onChange={e=>setForm(p=>({...p,ksef:e.target.checked}))} style={{width:14,height:14,cursor:'pointer'}}/><label htmlFor="cost-ksef" style={{fontSize:12,cursor:'pointer'}}>Faktura w KSeF</label></div>
      </div>

      <div style={{marginTop:12,borderTop:'0.5px solid rgba(0,0,0,0.08)',paddingTop:12}}>
        <div style={C.secT}>Dokument (PDF/zdjęcie)</div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
          <label style={{...C.btnP,cursor:'pointer',position:'relative',overflow:'hidden'}}>{fileLoading?<><i className="ti ti-loader-2" style={{animation:'spin 1s linear infinite'}}/> Wczytywanie...</>:<><i className="ti ti-upload"/> Wgraj PDF/zdjęcie</>}<input type="file" accept=".pdf,application/pdf,image/*" onChange={hFile} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={fileLoading}/></label>
          <label style={{...C.btn,cursor:'pointer',position:'relative',overflow:'hidden'}}><i className="ti ti-camera"/> Zrób zdjęcie<input type="file" accept="image/*" capture="environment" onChange={hFile} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} disabled={fileLoading}/></label>
